<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service du jour - Restauration Les Bouleaux</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <h1>🍽️ Restauration Les Bouleaux</h1>
    <div id="menu"></div>

    <h2>Liste de service J-0</h2>
    <p class="no-print">Liste nominative des résidents présents à servir, avec leurs spécificités.</p>

    <div class="toolbar no-print">
        <label><strong>Date :</strong></label>
        <input type="date" id="date-srv">
        <label><strong>Repas :</strong></label>
        <select id="repas-srv">
            <option value="petit_dej">🥐 Petit-déjeuner</option>
            <option value="dejeuner" selected>🍽️ Déjeuner</option>
            <option value="diner">🌙 Dîner</option>
        </select>
        <button class="btn-primary" onclick="genererService()">🔄 Générer</button>
        <button class="btn-print" onclick="window.print()">🖨️ Imprimer</button>
    </div>

    <div id="contenu" class="print-area">
        <p class="info-msg">Choisissez une date et un repas, puis cliquez "Générer".</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared.js"></script>
    <script>
        async function genererService() {
            const date = document.getElementById('date-srv').value;
            const repas = document.getElementById('repas-srv').value;
            const contenu = document.getElementById('contenu');
            contenu.innerHTML = '<p class="loading">⏳ Chargement...</p>';

            const residents = await chargerResidentsActifs();
            const { data: presences } = await supaClient
                .from(TABLE_PRESENCES).select('*').eq('date', date).eq('repas', repas);

            const presents = residents.filter(r => {
                const p = (presences || []).find(x => x.resident_id === r.id);
                return p ? p.present : true;
            });
            const absents = residents.filter(r => {
                const p = (presences || []).find(x => x.resident_id === r.id);
                return p && !p.present;
            });

            // EJC pour le déjeuner
            let detailEjc = '';
            let totalEjcNet = 0;
            if (repas === 'dejeuner') {
                const { data: cmdArr } = await supaClient
                    .from(TABLE_COMMANDES_EJC).select('*').eq('date', date);
                const { data: annArr } = await supaClient
                    .from(TABLE_ANNULATIONS_EJC).select('*').eq('date', date);
                const cmd = (cmdArr && cmdArr[0]) || null;
                const ann = (annArr && annArr[0]) || null;

                if (cmd) {
                    const categories = [
                        { code: 'adulte_normal', label: 'Adulte normal' },
                        { code: 'adulte_sans_lactose', label: 'Adulte sans lactose' },
                        { code: 'adulte_sans_porc', label: 'Adulte sans porc' },
                        { code: 'adulte_vegetarien', label: 'Adulte végétarien' },
                        { code: 'adulte_sans_proteine_lactique', label: 'Adulte sans protéine lactique' },
                        { code: 'enfant_normal', label: 'Enfant normal' },
                        { code: 'enfant_sans_lactose', label: 'Enfant sans lactose' },
                        { code: 'enfant_sans_porc', label: 'Enfant sans porc' },
                        { code: 'enfant_vegetarien', label: 'Enfant végétarien' },
                        { code: 'enfant_sans_proteine_lactique', label: 'Enfant sans protéine lactique' }
                    ];
                    const lignes = [];
                    for (const c of categories) {
                        const nbCmd = cmd[c.code] || 0;
                        const nbAnn = (ann && ann[c.code]) || 0;
                        const net = nbCmd - nbAnn;
                        if (net > 0) {
                            totalEjcNet += net;
                            lignes.push(`<li>${c.label} : <strong>${net}</strong></li>`);
                        }
                    }
                    if (lignes.length) {
                        detailEjc = `<div class="print-section"><h3>🍴 EJC Péry — ${totalEjcNet} portion(s)</h3><ul class="print-list">${lignes.join('')}</ul></div>`;
                    }
                }
            }

            let html = `
                <h2>Service — ${dateFr(date)}</h2>
                <h3>${libelleRepas(repas)}</h3>
                <p><strong>${presents.length}</strong> résident(s) à servir`;
            if (totalEjcNet > 0) html += ` + <strong>${totalEjcNet}</strong> EJC Péry`;
            if (absents.length) html += ` — <strong>${absents.length}</strong> absent(s)`;
            html += '</p>';

            html += '<div class="print-section"><h3>✅ Résidents présents</h3>';
            if (!presents.length) {
                html += '<p><em>Aucun.</em></p>';
            } else {
                html += '<ul class="print-list">';
                for (const r of presents) {
                    const tags = [];
                    if (r.allergies) tags.push(`<span class="tag tag-allergie">⚠️ ${r.allergies}</span>`);
                    if (r.intolerances) tags.push(`<span class="tag tag-intolerance">🚫 ${r.intolerances}</span>`);
                    if (r.aversions) tags.push(`<span class="tag tag-aversion">N'aime pas : ${r.aversions}</span>`);
                    html += `<li><strong>${r.prenom} ${r.nom}</strong> ${tags.join(' ')}</li>`;
                }
                html += '</ul>';
            }
            html += '</div>';

            // Bloc EJC
            if (detailEjc) html += detailEjc;

            if (absents.length) {
                html += '<div class="print-section"><h3>❌ Absents</h3><ul class="print-list">';
                for (const r of absents) html += `<li>${r.prenom} ${r.nom}</li>`;
                html += '</ul></div>';
            }

            contenu.innerHTML = html;
        }

        // Démarrage protégé par auth (admin uniquement)
        (async () => {
            const auth = await verifierAuthEtRole(['admin']);
            if (!auth) return;
            afficherMenuComplet('service', auth.user.email, auth.profil.role, auth.profil.nom_affiche);
            document.getElementById('date-srv').value = aujourdhui();
            genererService();
        })();
    </script>
</body>
</html>
