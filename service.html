 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service du jour - Restauration Les Bouleaux</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        /* ============ TOOLBAR STYLE TOGGLE (harmonisé avec production.html) ============ */
        .toolbar-srv {
            background: white;
            padding: 14px 18px;
            border-radius: 8px;
            border: 0.5px solid #ddd;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 13px;
        }
        .toolbar-ligne {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toolbar-label {
            font-weight: 600;
            color: #2c5530;
            min-width: 85px;
        }

        /* === Navigation date === */
        .date-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .date-nav input[type="date"] {
            padding: 5px 10px;
            border: 1px solid #2c5530;
            border-radius: 6px;
            font-size: 13px;
            color: #2c5530;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-chevron {
            background: white;
            color: #2c5530;
            border: 1px solid #2c5530;
            width: 32px;
            height: 32px;
            padding: 0;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .btn-chevron:hover { background: #f0f8f0; }
        .btn-chevron:active { transform: scale(0.95); }
        .btn-aujourdhui {
            background: white;
            color: #2c5530;
            border: 1px solid #2c5530;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-aujourdhui:hover { background: #f0f8f0; }

        /* === Toggle group === */
        .toggle-group {
            display: inline-flex;
            border: 1px solid #2c5530;
            border-radius: 6px;
            overflow: hidden;
            flex-wrap: wrap;
        }
        .toggle-btn {
            background: white;
            color: #2c5530;
            border: none;
            border-right: 1px solid #2c5530;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.1s;
        }
        .toggle-btn:last-child { border-right: none; }
        .toggle-btn:hover { background: #f0f8f0; }
        .toggle-btn.active {
            background: #2c5530;
            color: white;
            font-weight: 600;
        }

        /* === Boutons action === */
        .toolbar-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 4px;
            border-top: 1px solid #eee;
            margin-top: 4px;
        }
        .btn-generer {
            background: #2c5530;
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-generer:hover { background: #1f3a22; }
        .btn-imprimer {
            background: white;
            color: #2c5530;
            border: 1px solid #2c5530;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-imprimer:hover { background: #f0f8f0; }

        .filtre-info-vide {
            background: #fff3cd;
            color: #856404;
            padding: 14px 18px;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
            margin: 15px 0;
            text-align: center;
        }

        /* ============ STYLES SERVICE ============ */
        .lieu-tag {
            display: inline-block;
            background: #2c5530;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 6px;
        }
        .lieu-tag-aucun {
            display: inline-block;
            background: #999;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            margin-left: 6px;
        }
        .chambre-tag {
            display: inline-block;
            background: #b35900;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 6px;
        }
        .chambre-tag-manquant {
            display: inline-block;
            background: #c00;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 6px;
        }
        .texture-tag {
            display: inline-block;
            background: #d4762b;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 6px;
        }
        .unite-tag {
            display: inline-block;
            background: #555;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .unite-tag.bouleaux { background: #2c5530; }
        .unite-tag.passerelle { background: #1976d2; }
        .unite-tag.appart {
            background: #1976d2;
        }

        .lieu-section {
            background: #f5faf5;
            border-left: 4px solid #2c5530;
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .lieu-section.lieu-section-chambre {
            background: #fff8f0;
            border-left-color: #b35900;
        }
        .lieu-section.lieu-section-appart {
            background: #f0f8ff;
            border-left-color: #1976d2;
        }
        .lieu-section h3 {
            margin-top: 0;
            color: #2c5530;
            border-bottom: 1px solid #c8d8c8;
            padding-bottom: 8px;
        }
        .lieu-section.lieu-section-chambre h3 {
            color: #b35900;
            border-bottom-color: #e8c8a8;
        }
        .lieu-section.lieu-section-appart h3 {
            color: #1976d2;
            border-bottom-color: #c0d8f0;
        }
        .ejc-cat-line { padding: 6px 0; }
        .ejc-cat-allergenes {
            font-size: 12px;
            color: #856404;
            margin-top: 2px;
        }
        .absence-prolongee-mention {
            color: #b35900;
            font-size: 12px;
            margin-left: 4px;
        }

        .service-doc {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            margin: 15px 0;
        }
        .service-titre {
            text-align: center;
            margin: 0 0 5px 0;
            font-size: 22px;
            color: #2c5530;
            border-bottom: 2px solid #2c5530;
            padding-bottom: 8px;
        }
        .service-soustitre {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            font-style: italic;
        }
        .service-filtres-rappel {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 15px;
            font-style: italic;
        }
        .repas-section {
            margin: 20px 0;
            padding-top: 12px;
            border-top: 3px solid #2c5530;
        }
        .repas-section:first-of-type {
            border-top: none;
            padding-top: 0;
        }
        .repas-section h2.titre-repas {
            color: #2c5530;
            margin: 0 0 4px 0;
            font-size: 18px;
        }
        .repas-section .resume-repas {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .pied-page {
            text-align: center;
            color: #888;
            font-size: 11px;
            margin-top: 15px;
            padding-top: 8px;
            border-top: 1px solid #ddd;
        }

        /* ============ IMPRESSION ============ */
        @media print {
            @page {
                size: A4 portrait;
                margin: 10mm;
            }
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            #app-header, #menu, h1, h2.page-title, .toolbar-srv, .no-print {
                display: none !important;
            }
            .service-doc {
                box-shadow: none;
                padding: 0;
                margin: 0;
                border-radius: 0;
            }
            .lieu-section {
                page-break-inside: avoid;
                background: white;
                border-left: 3px solid #000;
            }
            .lieu-section.lieu-section-chambre,
            .lieu-section.lieu-section-appart {
                background: white;
                border-left: 3px solid #000;
            }
            .repas-section { page-break-inside: avoid; }
            .chambre-tag, .chambre-tag-manquant, .texture-tag, .unite-tag {
                background: white !important;
                color: black !important;
                border: 1px solid #000;
                font-weight: bold;
            }
            .absence-prolongee-mention { color: black !important; }
            .pied-page { font-size: 9pt; }
        }
    </style>
</head>
<body>
    <div id="app-header"></div>
    <h1>🍽️ Restauration Les Bouleaux</h1>
    <div id="menu"></div>

    <h2 class="page-title">Liste de service J-0</h2>
    <p class="no-print">Liste nominative des résidents présents à servir, avec leurs spécificités.</p>

    <div class="toolbar-srv">
        <!-- Ligne Date + Repas -->
        <div class="toolbar-ligne">
            <span class="toolbar-label">📅 Date :</span>
            <div class="date-nav">
                <button class="btn-chevron" onclick="decalerJour(-1)" title="Jour précédent">‹</button>
                <input type="date" id="date-srv" onchange="genererService()">
                <button class="btn-chevron" onclick="decalerJour(1)" title="Jour suivant">›</button>
                <button class="btn-aujourdhui" onclick="resetAujourdhui()">📅 Aujourd'hui</button>
            </div>

            <span class="toolbar-label" style="margin-left:12px;">🍴 Repas :</span>
            <div class="toggle-group" id="toggle-repas">
                <button class="toggle-btn active" data-value="petit_dej" onclick="setToggleRepas(this)">🥐 P-déj</button>
                <button class="toggle-btn active" data-value="dejeuner" onclick="setToggleRepas(this)">🍽️ Déjeuner</button>
                <button class="toggle-btn active" data-value="diner" onclick="setToggleRepas(this)">🌙 Dîner</button>
            </div>
        </div>

        <!-- Ligne Résidents (unité) -->
        <div class="toolbar-ligne">
            <span class="toolbar-label">👥 Résidents :</span>
            <div class="toggle-group" id="toggle-residents">
                <button class="toggle-btn active" data-value="toutes" onclick="setToggle('residents', this)">🏘️ Tout le monde</button>
                <button class="toggle-btn" data-value="bouleaux" onclick="setToggle('residents', this)">🏠 Bouleaux</button>
                <button class="toggle-btn" data-value="passerelle" onclick="setToggle('residents', this)">🌉 Passerelle</button>
                <button class="toggle-btn" data-value="aucun" onclick="setToggle('residents', this)">⛔ Aucun</button>
            </div>
        </div>

        <!-- Ligne Lieu (résidents) -->
        <div class="toolbar-ligne">
            <span class="toolbar-label">📍 Lieu :</span>
            <div class="toggle-group" id="toggle-lieu">
                <button class="toggle-btn active" data-value="tous" onclick="setToggle('lieu', this)">📍 Tous les lieux</button>
                <!-- Boutons lieux ajoutés dynamiquement -->
            </div>
        </div>

        <!-- Ligne Clients externes -->
        <div class="toolbar-ligne">
            <span class="toolbar-label">🍴 Clients :</span>
            <div class="toggle-group" id="toggle-client">
                <button class="toggle-btn active" data-value="tous" onclick="setToggle('client', this)">🍴 Tout le monde</button>
                <button class="toggle-btn" data-value="aucun" onclick="setToggle('client', this)">⛔ Aucun</button>
                <!-- Boutons clients ajoutés dynamiquement -->
            </div>
        </div>

        <!-- Ligne Appartement -->
        <div class="toolbar-ligne">
            <span class="toolbar-label">🏨 Appartement :</span>
            <div class="toggle-group" id="toggle-appart">
                <button class="toggle-btn active" data-value="tous" onclick="setToggle('appart', this)">🏨 Tous</button>
                <button class="toggle-btn" data-value="seul" onclick="setToggle('appart', this)">🏨 Uniquement</button>
                <button class="toggle-btn" data-value="aucun" onclick="setToggle('appart', this)">⛔ Aucun</button>
            </div>
        </div>

        <!-- Boutons d'action -->
        <div class="toolbar-actions">
            <button class="btn-generer" onclick="genererService()">🔄 Générer</button>
            <button class="btn-imprimer" onclick="window.print()">🖨️ Imprimer</button>
        </div>
    </div>

    <div id="contenu">
        <p class="info-msg">Choisissez une date et cliquez "Générer".</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1"></script>
    <script src="shared.js"></script>
    <script>
        let donneesServiceCache = null;
        let lieuxDisponibles = [];
        let tousLesClients = [];

        // États des toggles
        let valRepas = ['petit_dej', 'dejeuner', 'diner'];
        let valResidents = 'toutes';
        let valLieu = 'tous';
        let valClient = 'tous';
        let valAppart = 'tous';

        function heureMaintenant() {
            return new Date().toLocaleString('fr-FR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function resetAujourdhui() {
            document.getElementById('date-srv').value = aujourdhui();
            genererService();
        }

        function decalerJour(delta) {
            const input = document.getElementById('date-srv');
            const val = input.value || aujourdhui();
            const d = new Date(val + 'T00:00:00');
            d.setDate(d.getDate() + delta);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            input.value = `${yyyy}-${mm}-${dd}`;
            genererService();
        }

        // Toggle Repas = multi-sélection (on peut cocher plusieurs repas)
        function setToggleRepas(btn) {
            btn.classList.toggle('active');
            const actifs = Array.from(document.querySelectorAll('#toggle-repas .toggle-btn.active'))
                .map(b => b.dataset.value);
            valRepas = actifs;
            genererService();
        }

        // Toggle simple = un seul actif par groupe
        function setToggle(groupe, btn) {
            const containerId = `toggle-${groupe}`;
            const container = document.getElementById(containerId);
            container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const valeur = btn.dataset.value;
            if (groupe === 'residents') valResidents = valeur;
            else if (groupe === 'lieu') valLieu = valeur;
            else if (groupe === 'client') valClient = valeur;
            else if (groupe === 'appart') valAppart = valeur;

            genererService();
        }

        async function chargerLieux() {
            const { data, error } = await supaClient
                .from('lieux_repas')
                .select('*')
                .eq('actif', true)
                .order('ordre', { ascending: true });
            if (error) console.error(error);
            lieuxDisponibles = data || [];
        }

        function nomLieu(id) {
            if (!id) return null;
            const l = lieuxDisponibles.find(x => x.id === id);
            return l ? l.nom : null;
        }

        function estLieuChambre(idOuNom) {
            let nom = null;
            if (typeof idOuNom === 'string') {
                nom = idOuNom;
            } else if (idOuNom != null) {
                nom = nomLieu(idOuNom);
            }
            if (!nom) return false;
            return nom.toLowerCase().includes('chambre');
        }

        function lieuDefautPourRepas(resident, repas) {
            if (repas === 'petit_dej') return resident.lieu_defaut_petit_dej_id || null;
            if (repas === 'dejeuner') return resident.lieu_defaut_dejeuner_id || null;
            if (repas === 'diner') return resident.lieu_defaut_diner_id || null;
            return null;
        }

        function texteAllergiesResident(r) {
            const parts = [];
            if (r.allergenes && r.allergenes.length) {
                for (const code of r.allergenes) parts.push(nomAllergene(code));
            }
            const autres = (r.allergies || '').trim();
            if (autres) parts.push(autres);
            return parts.join(' · ');
        }

        function tagsResident(r) {
            const tags = [];
            const allergiesTxt = texteAllergiesResident(r);
            if (allergiesTxt) tags.push(`<span class="tag tag-allergie">⚠️ Sans : ${allergiesTxt}</span>`);
            if (r.intolerances) tags.push(`<span class="tag tag-intolerance">🚫 ${r.intolerances}</span>`);
            if (r.aversions) tags.push(`<span class="tag tag-aversion">Non-goûts : ${r.aversions}</span>`);
            return tags.join(' ');
        }

        // Tags pour un occupant d'appartement (allergenes + allergies texte + non_gouts)
        function tagsOccupantAppart(o) {
            const tags = [];
            const parts = [];
            if (o.allergenes && o.allergenes.length) {
                for (const code of o.allergenes) parts.push(nomAllergene(code));
            }
            const autres = (o.allergies || '').trim();
            if (autres) parts.push(autres);
            const allergiesTxt = parts.join(' · ');
            if (allergiesTxt) tags.push(`<span class="tag tag-allergie">⚠️ Sans : ${allergiesTxt}</span>`);
            if (o.non_gouts && o.non_gouts.trim()) {
                tags.push(`<span class="tag tag-aversion">Non-goûts : ${o.non_gouts.trim()}</span>`);
            }
            return tags.join(' ');
        }

        function textureTag(r) {
            const tx = r.texture_effective || TEXTURE_DEFAUT;
            if (tx === TEXTURE_DEFAUT) return '';
            return `<span class="texture-tag">${nomTexture(tx)}</span>`;
        }

        function uniteTag(r) {
            if (valResidents !== 'toutes') return '';
            if (!r.unite) return '';
            const cls = r.unite === 'bouleaux' ? 'bouleaux' : 'passerelle';
            return `<span class="unite-tag ${cls}">${nomUniteSansEmoji(r.unite)}</span>`;
        }

        function texteRappelFiltres() {
            const labelsRepas = { petit_dej: 'Petit-déjeuner', dejeuner: 'Déjeuner', diner: 'Dîner' };
            const labelsResidents = {
                toutes: 'Tous résidents',
                bouleaux: 'Résidents Bouleaux',
                passerelle: 'Résidents Passerelle',
                aucun: 'Aucun résident'
            };
            const labelsAppart = {
                tous: 'Avec appartement',
                seul: 'Appartement uniquement',
                aucun: 'Sans appartement'
            };

            const r = valRepas.length === 3 ? 'Tous les repas' : valRepas.map(x => labelsRepas[x]).join(', ');

            let lieuTxt;
            if (valLieu === 'tous') lieuTxt = 'Tous les lieux';
            else {
                const l = lieuxDisponibles.find(x => String(x.id) === String(valLieu));
                lieuTxt = l ? l.nom : 'Lieu inconnu';
            }

            let cTxt;
            if (valClient === 'tous') cTxt = 'Tous clients ext.';
            else if (valClient === 'aucun') cTxt = 'Aucun client ext.';
            else {
                const c = tousLesClients.find(x => x.id === valClient);
                cTxt = c ? c.nom : 'Client inconnu';
            }

            return `Filtres : ${r} — ${labelsResidents[valResidents]} — ${lieuTxt} — ${cTxt} — ${labelsAppart[valAppart]}`;
        }

        // ===== CHARGEMENT DES DONNÉES =====
        async function genererService() {
            const date = document.getElementById('date-srv').value;
            const contenu = document.getElementById('contenu');

            const repasFiltres = valRepas;
            const residentsChoix = valResidents;
            const lieuChoix = valLieu;
            const clientChoix = valClient;
            const appartChoix = valAppart;

            // LOGIQUE DE FILTRES SÉPARÉS
            const lieuPrecisChoisi = lieuChoix !== 'tous';
            const clientPrecisChoisi = clientChoix !== 'tous' && clientChoix !== 'aucun';
            const appartSeul = appartChoix === 'seul';

            let inclureResidents = residentsChoix !== 'aucun';
            let inclureEjc = clientChoix !== 'aucun';
            let inclureAppart = appartChoix !== 'aucun';

            // Choisir un client EJC précis masque les résidents et l'appartement
            if (clientPrecisChoisi) {
                inclureResidents = false;
                inclureAppart = false;
            }
            // Choisir un lieu résident précis masque les clients EJC et l'appartement
            if (lieuPrecisChoisi) {
                inclureEjc = false;
                inclureAppart = false;
            }
            // Choisir 'Appartement uniquement' masque les résidents et les clients
            if (appartSeul) {
                inclureResidents = false;
                inclureEjc = false;
                inclureAppart = true;
            }

            if (repasFiltres.length === 0 || (!inclureResidents && !inclureEjc && !inclureAppart)) {
                contenu.innerHTML = `<div class="filtre-info-vide">
                    ⚠️ <strong>Aucun élément à afficher</strong><br>
                    Sélectionne au moins un repas et au moins une source de mangeurs (résidents, clients externes ou appartement).
                </div>`;
                donneesServiceCache = null;
                return;
            }

            contenu.innerHTML = '<p class="loading">⏳ Chargement...</p>';
            await chargerLieux();

            // Résidents (filtrés par unité)
            let residents = [];
            let toutesPresences = [];
            let absences = [];
            if (inclureResidents) {
                if (residentsChoix === 'toutes') {
                    residents = await chargerResidentsActifs();
                } else {
                    residents = await chargerResidentsActifs(residentsChoix);
                }
                const { data: presences } = await supaClient
                    .from(TABLE_PRESENCES).select('*').eq('date', date);
                toutesPresences = presences || [];
                absences = await chargerAbsencesPourDate(date);
            }

            // Clients externes
            let categoriesEjc = [];
            let commandesArr = [];
            let annulationsArr = [];
            if (inclureEjc) {
                categoriesEjc = await chargerCategoriesEjc(false);
                const { data: cmdArr } = await supaClient
                    .from(TABLE_COMMANDES_EJC).select('*').eq('date', date);
                const { data: annArr } = await supaClient
                    .from(TABLE_ANNULATIONS_EJC).select('*').eq('date', date);

                if (clientChoix !== 'tous' && clientChoix !== 'aucun') {
                    commandesArr = (cmdArr || []).filter(c => c.client_id === clientChoix);
                    annulationsArr = (annArr || []).filter(a => a.client_id === clientChoix);
                } else {
                    commandesArr = cmdArr || [];
                    annulationsArr = annArr || [];
                }
            }

            // ===== APPARTEMENT : séjours en cours qui couvrent la date =====
            let sejoursAppart = [];
            let presencesAppart = [];
            if (inclureAppart) {
                const { data: sejours, error: errS } = await supaClient
                    .from('sejours_appartement')
                    .select('*, personne:personnes_appartement(*)')
                    .eq('statut', 'en_cours')
                    .lte('date_arrivee', date)
                    .gte('date_depart', date);
                if (errS) console.error('Erreur séjours :', errS);
                sejoursAppart = sejours || [];

                if (sejoursAppart.length > 0) {
                    const idsSejours = sejoursAppart.map(s => s.id);
                    const { data: pa, error: errPA } = await supaClient
                        .from('presences_appartement')
                        .select('*')
                        .eq('date', date)
                        .in('sejour_id', idsSejours);
                    if (errPA) console.error('Erreur présences appart :', errPA);
                    presencesAppart = pa || [];
                }
            }

            const donneesParRepas = [];
            for (const repas of repasFiltres) {
                const dataRepas = {
                    code: repas,
                    libelle: libelleRepas(repas),
                    presents: [],
                    absents: [],
                    blocsEjc: [],
                    totalEjcNet: 0,
                    occupantsAppartPresents: [],
                    occupantsAppartAbsents: []
                };

                if (inclureResidents) {
                    const presencesRepas = toutesPresences.filter(p => p.repas === repas);
                    for (const r of residents) {
                        const absence = estEnAbsenceProlongee(absences, r.id, date, repas);
                        if (absence) {
                            dataRepas.absents.push({ ...r, _absenceProlongee: absence });
                            continue;
                        }
                        const p = presencesRepas.find(x => x.resident_id === r.id);
                        const estPresent = p ? p.present : true;
                        if (estPresent) {
                            const lieuDefautRepas = lieuDefautPourRepas(r, repas);
                            const lieuEffectifId = (p && p.lieu_id != null) ? p.lieu_id : lieuDefautRepas;
                            const textureEffective = (p && p.texture)
                                ? p.texture
                                : getTextureDefautResident(r, repas);

                            if (lieuPrecisChoisi) {
                                if (String(lieuEffectifId) !== String(lieuChoix)) {
                                    continue;
                                }
                            }

                            dataRepas.presents.push({
                                ...r,
                                lieu_effectif_id: lieuEffectifId,
                                texture_effective: textureEffective
                            });
                        } else {
                            if (!lieuPrecisChoisi) {
                                dataRepas.absents.push(r);
                            }
                        }
                    }
                }

                // Clients externes uniquement pour le déjeuner
                if (inclureEjc && repas === 'dejeuner') {
                    const cmdMap = {};
                    const annMap = {};
                    for (const c of commandesArr) {
                        const k = `${c.client_id}::${c.categorie_id}`;
                        cmdMap[k] = (cmdMap[k] || 0) + (c.quantite || 0);
                    }
                    for (const a of annulationsArr) {
                        const k = `${a.client_id}::${a.categorie_id}`;
                        annMap[k] = (annMap[k] || 0) + (a.quantite || 0);
                    }

                    const blocsParClient = {};
                    for (const cle in cmdMap) {
                        const parts = cle.split('::');
                        const clientId = parts[0];
                        const catId = parseInt(parts[1]);
                        const net = (cmdMap[cle] || 0) - (annMap[cle] || 0);
                        if (net <= 0) continue;
                        const cat = categoriesEjc.find(c => c.id === catId);
                        if (!blocsParClient[clientId]) {
                            blocsParClient[clientId] = { client_id: clientId, lignes: [], total: 0 };
                        }
                        blocsParClient[clientId].lignes.push({
                            categorie: cat,
                            quantite: net
                        });
                        blocsParClient[clientId].total += net;
                        dataRepas.totalEjcNet += net;
                    }

                    for (const clientId in blocsParClient) {
                        const bloc = blocsParClient[clientId];
                        const client = tousLesClients.find(c => c.id === clientId);
                        const nomClient = client ? client.nom : `Client inconnu`;

                        const lignesTriees = bloc.lignes.sort((a, b) => {
                            const oa = a.categorie ? (a.categorie.ordre || 999) : 999;
                            const ob = b.categorie ? (b.categorie.ordre || 999) : 999;
                            return oa - ob;
                        });

                        const lignesHtml = lignesTriees.map(l => {
                            const nomCat = l.categorie ? l.categorie.nom : 'Catégorie inconnue';
                            let allergenesTxt = '';
                            if (l.categorie && l.categorie.allergenes && l.categorie.allergenes.length) {
                                const list = l.categorie.allergenes.map(a => nomAllergene(a)).join(' · ');
                                allergenesTxt = `<div class="ejc-cat-allergenes">🚫 Sans : ${list}</div>`;
                            }
                            return `<li class="ejc-cat-line">
                                <strong>${nomCat}</strong> : <strong>${l.quantite}</strong> portion(s)
                                ${allergenesTxt}
                            </li>`;
                        }).join('');

                        dataRepas.blocsEjc.push(
                            `<div class="print-section">
                                <h3>🍴 ${nomClient} — ${bloc.total} portion(s)</h3>
                                <ul class="print-list">${lignesHtml}</ul>
                            </div>`
                        );
                    }
                }

                // ===== Occupants d'appartement pour ce repas =====
                if (inclureAppart) {
                    const mapPresAppart = {};
                    for (const pa of presencesAppart) {
                        if (pa.repas === repas) {
                            mapPresAppart[pa.sejour_id] = pa;
                        }
                    }

                    for (const s of sejoursAppart) {
                        if (!s.personne) continue;
                        const pa = mapPresAppart[s.id];
                        if (pa && pa.present === false) {
                            dataRepas.occupantsAppartAbsents.push(s.personne);
                        } else {
                            dataRepas.occupantsAppartPresents.push(s.personne);
                        }
                    }
                }

                donneesParRepas.push(dataRepas);
            }

            donneesServiceCache = {
                date, donneesParRepas,
                inclureResidents, inclureEjc, inclureAppart,
                lieuPrecisChoisi
            };
            afficherService();
        }

        // ===== AFFICHAGE =====
        function afficherService() {
            const contenu = document.getElementById('contenu');
            const { date, donneesParRepas, inclureResidents, inclureEjc, inclureAppart } = donneesServiceCache;

            let html = `<div class="service-doc">
                <h2 class="service-titre">Service du ${dateFr(date)}</h2>
                <p class="service-soustitre">Liste nominative à utiliser pendant le service</p>
                <p class="service-filtres-rappel">${texteRappelFiltres()}</p>`;

            let blocsAffiches = 0;

            for (const dr of donneesParRepas) {
                const aDuContenu = (inclureResidents && (dr.presents.length > 0 || dr.absents.length > 0))
                                 || (inclureEjc && dr.totalEjcNet > 0)
                                 || (inclureAppart && (dr.occupantsAppartPresents.length > 0 || dr.occupantsAppartAbsents.length > 0));
                if (!aDuContenu) continue;

                blocsAffiches++;

                html += `<div class="repas-section">
                    <h2 class="titre-repas">${dr.libelle}</h2>
                    <p class="resume-repas">`;
                const partsResume = [];
                if (inclureResidents) partsResume.push(`<strong>${dr.presents.length}</strong> résident(s) à servir`);
                if (inclureEjc && dr.totalEjcNet > 0) partsResume.push(`<strong>${dr.totalEjcNet}</strong> client(s) externe(s)`);
                if (inclureAppart && dr.occupantsAppartPresents.length > 0) {
                    partsResume.push(`<strong>${dr.occupantsAppartPresents.length}</strong> occupant(s) appart.`);
                }
                if (inclureResidents && dr.absents.length > 0) partsResume.push(`<strong>${dr.absents.length}</strong> absent(s)`);
                if (inclureAppart && dr.occupantsAppartAbsents.length > 0) {
                    partsResume.push(`<strong>${dr.occupantsAppartAbsents.length}</strong> absent(s) appart.`);
                }
                html += partsResume.join(' · ') + '</p>';

                // ===== Résidents =====
                if (inclureResidents) {
                    const groupes = {};
                    const sansLieu = [];
                    for (const r of dr.presents) {
                        if (r.lieu_effectif_id) {
                            if (!groupes[r.lieu_effectif_id]) groupes[r.lieu_effectif_id] = [];
                            groupes[r.lieu_effectif_id].push(r);
                        } else {
                            sansLieu.push(r);
                        }
                    }

                    if (!dr.presents.length) {
                        html += '<div class="print-section"><h3>✅ Résidents présents</h3><p><em>Aucun.</em></p></div>';
                    } else {
                        for (const lieu of lieuxDisponibles) {
                            const liste = groupes[lieu.id];
                            if (!liste || !liste.length) continue;
                            const estChambre = estLieuChambre(lieu.nom);
                            const classeSection = estChambre ? 'lieu-section lieu-section-chambre print-section' : 'lieu-section print-section';
                            const icone = estChambre ? '🚪' : '📍';
                            html += `<div class="${classeSection}">`;
                            html += `<h3>${icone} ${lieu.nom} — ${liste.length} résident(s)</h3>`;

                            let listeTriee = liste;
                            if (estChambre) {
                                listeTriee = [...liste].sort((a, b) => {
                                    const na = a.numero_chambre;
                                    const nb = b.numero_chambre;
                                    if (na == null && nb == null) return 0;
                                    if (na == null) return 1;
                                    if (nb == null) return -1;
                                    return na - nb;
                                });
                            }

                            html += '<ul class="print-list">';
                            for (const r of listeTriee) {
                                const chambreTag = estChambre
                                    ? (r.numero_chambre
                                        ? `<span class="chambre-tag">🚪 Ch. ${r.numero_chambre}</span>`
                                        : `<span class="chambre-tag-manquant">🚪 Chambre non renseignée</span>`)
                                    : '';
                                html += `<li><strong>${r.prenom} ${r.nom}</strong> ${uniteTag(r)} ${chambreTag} ${textureTag(r)} ${tagsResident(r)}</li>`;
                            }
                            html += '</ul></div>';
                        }
                        if (sansLieu.length) {
                            html += `<div class="lieu-section print-section" style="background:#fffaf0;border-left-color:#999;">`;
                            html += `<h3>❓ Lieu non défini — ${sansLieu.length} résident(s)</h3>`;
                            html += '<ul class="print-list">';
                            for (const r of sansLieu) {
                                html += `<li><strong>${r.prenom} ${r.nom}</strong> ${uniteTag(r)} ${textureTag(r)} ${tagsResident(r)}</li>`;
                            }
                            html += '</ul></div>';
                        }
                    }
                }

                // ===== Clients externes =====
                if (inclureEjc && dr.blocsEjc.length) {
                    for (const bloc of dr.blocsEjc) {
                        html += bloc;
                    }
                }

                // ===== Occupants d'appartement (présents) =====
                if (inclureAppart && dr.occupantsAppartPresents.length > 0) {
                    html += `<div class="lieu-section lieu-section-appart print-section">`;
                    html += `<h3>🏨 Appartement Corgémont — ${dr.occupantsAppartPresents.length} occupant(s)</h3>`;
                    html += '<ul class="print-list">';
                    for (const o of dr.occupantsAppartPresents) {
                        const tagAppart = '<span class="unite-tag appart">Appart.</span>';
                        html += `<li><strong>${o.prenom || ''} ${o.nom || ''}</strong> ${tagAppart} ${tagsOccupantAppart(o)}</li>`;
                    }
                    html += '</ul></div>';
                }

                // ===== Absents (résidents + appartement) =====
                const aDesAbsents = (inclureResidents && dr.absents.length > 0)
                                  || (inclureAppart && dr.occupantsAppartAbsents.length > 0);
                if (aDesAbsents) {
                    html += '<div class="print-section"><h3>❌ Absents</h3><ul class="print-list">';
                    if (inclureResidents) {
                        for (const r of dr.absents) {
                            if (r._absenceProlongee) {
                                html += `<li>${r.prenom} ${r.nom} ${uniteTag(r)} <span class="absence-prolongee-mention">🏥 Absence prolongée jusqu'au ${dateFr(r._absenceProlongee.date_fin)}</span></li>`;
                            } else {
                                html += `<li>${r.prenom} ${r.nom} ${uniteTag(r)}</li>`;
                            }
                        }
                    }
                    if (inclureAppart) {
                        for (const o of dr.occupantsAppartAbsents) {
                            const tagAppart = '<span class="unite-tag appart">Appart.</span>';
                            html += `<li>${o.prenom || ''} ${o.nom || ''} ${tagAppart}</li>`;
                        }
                    }
                    html += '</ul></div>';
                }

                html += '</div>';
            }

            if (blocsAffiches === 0) {
                html += `<div class="filtre-info-vide">
                    Aucune donnée à afficher pour les filtres sélectionnés à cette date.
                </div>`;
            }

            html += `<div class="pied-page">Document généré le ${heureMaintenant()} — Restauration Les Bouleaux, Corgémont</div>`;
            html += '</div>';

            contenu.innerHTML = html;
        }

        // ===== INIT =====
        async function remplirToggleClients() {
            tousLesClients = await chargerTousLesClients(true);
            const container = document.getElementById('toggle-client');
            const btnAucun = container.querySelector('[data-value="aucun"]');
            for (const c of tousLesClients) {
                const btn = document.createElement('button');
                btn.className = 'toggle-btn';
                btn.dataset.value = c.id;
                btn.textContent = `🍴 ${c.nom}`;
                btn.onclick = function() { setToggle('client', this); };
                container.insertBefore(btn, btnAucun);
            }
        }

        async function remplirToggleLieux() {
            if (!lieuxDisponibles.length) await chargerLieux();
            const container = document.getElementById('toggle-lieu');
            for (const l of lieuxDisponibles) {
                const btn = document.createElement('button');
                btn.className = 'toggle-btn';
                btn.dataset.value = l.id;
                const estChambre = estLieuChambre(l.nom);
                btn.textContent = `${estChambre ? '🚪' : '📍'} ${l.nom}`;
                btn.onclick = function() { setToggle('lieu', this); };
                container.appendChild(btn);
            }
        }

        (async () => {
            const auth = await verifierAuthEtRole(['admin']);
            if (!auth) return;
            afficherMenuComplet('service', auth.user.email, auth.profil.role, auth.profil.nom_affiche);
            document.getElementById('date-srv').value = aujourdhui();
            await chargerLieux();
            await remplirToggleLieux();
            await remplirToggleClients();
            genererService();
        })();
    </script>
</body>
