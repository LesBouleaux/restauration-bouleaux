 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production J-1 - Restauration Les Bouleaux</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <h1>🍽️ Restauration Les Bouleaux</h1>
    <div id="menu"></div>

    <h2>Liste de production J-1</h2>
    <p class="no-print">Cette liste sert à préparer les portions <strong>la veille</strong> du repas.</p>

    <div class="toolbar no-print">
        <label><strong>Date du repas :</strong></label>
        <input type="date" id="date-prod">
        <button class="btn-primary" onclick="genererListe()">🔄 Générer</button>
        <button class="btn-print" onclick="window.print()">🖨️ Imprimer</button>
    </div>

    <div id="contenu" class="print-area">
        <p class="info-msg">Choisissez une date et cliquez "Générer".</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared.js"></script>
    <script>
        async function genererListe() {
            const date = document.getElementById('date-prod').value;
            const contenu = document.getElementById('contenu');
            contenu.innerHTML = '<p class="loading">⏳ Chargement...</p>';

            const residents = await chargerResidentsActifs();
            const { data: presences } = await supaClient
                .from(TABLE_PRESENCES).select('*').eq('date', date);

            // Charger commandes et annulations EJC pour la date
            const { data: cmdEjcArr } = await supaClient
                .from(TABLE_COMMANDES_EJC).select('*').eq('date', date);
            const { data: annEjcArr } = await supaClient
                .from(TABLE_ANNULATIONS_EJC).select('*').eq('date', date);
            const cmdEjc = (cmdEjcArr && cmdEjcArr[0]) || null;
            const annEjc = (annEjcArr && annEjcArr[0]) || null;

            const repas = ['petit_dej', 'dejeuner', 'diner'];
            let html = `<h2>Production du ${dateFr(date)}</h2>`;

            for (const codeRepas of repas) {
                const presentsForRepas = residents.filter(r => {
                    const p = (presences || []).find(x => x.resident_id === r.id && x.repas === codeRepas);
                    return p ? p.present : true;
                });

                const avecAllergie = presentsForRepas.filter(r => r.allergies);
                const avecIntolerance = presentsForRepas.filter(r => r.intolerances);

                // Pour le déjeuner, on ajoute les commandes EJC (nettes des annulations)
                let totalEjc = 0;
                let detailEjc = '';
                if (codeRepas === 'dejeuner' && cmdEjc) {
                    const categories = [
                        { code: 'adulte_normal', label: 'Adulte normal' },
                        { code: 'adulte_sans_lactose', label: 'Adulte sans lactose' },
                        { code: 'adulte_sans_porc', label: 'Adulte sans porc' },
                        { code: 'adulte_vegetarien', label: 'Adulte végétarien' },
                        { code: 'adulte_sans_proteine_lactique', label: 'Adulte sans protéine lactique' },
                        { code: 'enfant_normal', label: 'Enfant normal' },
                        { code: 'enfant_sans_lactose', label: 'Enfant sans lactose' },
                        { code: 'enfant_sans_porc', label: 'Enfant sans porc' },
                        { code: 'enfant_vegetarien', label: 'Enfant végétarien' },
                        { code: 'enfant_sans_proteine_lactique', label: 'Enfant sans protéine lactique' }
                    ];
                    const lignes = [];
                    for (const c of categories) {
                        const cmd = cmdEjc[c.code] || 0;
                        const ann = (annEjc && annEjc[c.code]) || 0;
                        const net = cmd - ann;
                        if (cmd > 0 || ann > 0) {
                            totalEjc += net;
                            lignes.push(`<li>${c.label} : <strong>${net}</strong> (commandé ${cmd}${ann ? `, annulé ${ann}` : ''})</li>`);
                        }
                    }
                    if (lignes.length) {
                        detailEjc = `<p><strong>EJC Péry — ${totalEjc} portion(s) :</strong></p><ul class="print-list">${lignes.join('')}</ul>`;
                    }
                }

                const totalGeneral = presentsForRepas.length + totalEjc;
                let titreSection = `${libelleRepas(codeRepas)} — ${presentsForRepas.length} portion(s)`;
                if (totalEjc > 0) {
                    titreSection = `${libelleRepas(codeRepas)} — ${totalGeneral} portion(s) au total (${presentsForRepas.length} résidents + ${totalEjc} EJC)`;
                }

                html += `
                    <div class="print-section">
                        <h3>${titreSection}</h3>`;

                if (detailEjc) html += detailEjc;

                if (avecAllergie.length || avecIntolerance.length) {
                    html += '<p><strong>Adaptations résidents :</strong></p><ul class="print-list">';
                    for (const r of avecAllergie) {
                        html += `<li>⚠️ <strong>${r.prenom} ${r.nom}</strong> — Allergie : ${r.allergies}</li>`;
                    }
                    for (const r of avecIntolerance) {
                        html += `<li>🚫 <strong>${r.prenom} ${r.nom}</strong> — Intolérance : ${r.intolerances}</li>`;
                    }
                    html += '</ul>';
                } else if (!detailEjc) {
                    html += '<p><em>Aucune adaptation particulière.</em></p>';
                }
                html += '</div>';
            }

            contenu.innerHTML = html;
        }

        // Démarrage protégé par auth (admin uniquement)
        (async () => {
            const auth = await verifierAuthEtRole(['admin']);
            if (!auth) return;
            afficherMenuComplet('production', auth.user.email, auth.profil.role, auth.profil.nom_affiche);
            document.getElementById('date-prod').value = demain();
            genererListe();
        })();
    </script>
</body>
</html>
