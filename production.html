 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production J-1 - Restauration Les Bouleaux</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .toolbar-prod {
            background: white;
            padding: 14px 18px;
            border-radius: 8px;
            border: 0.5px solid #ddd;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 13px;
        }
        .toolbar-ligne {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toolbar-label {
            font-weight: 600;
            color: #2c5530;
            min-width: 85px;
        }
        .date-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .date-nav input[type="date"] {
            padding: 5px 10px;
            border: 1px solid #2c5530;
            border-radius: 6px;
            font-size: 13px;
            color: #2c5530;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-chevron {
            background: white;
            color: #2c5530;
            border: 1px solid #2c5530;
            width: 32px;
            height: 32px;
            padding: 0;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .btn-chevron:hover { background: #f0f8f0; }
        .btn-chevron:active { transform: scale(0.95); }
        .btn-demain {
            background: white;
            color: #2c5530;
            border: 1px solid #2c5530;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-demain:hover { background: #f0f8f0; }
        .toggle-group {
            display: inline-flex;
            border: 1px solid #2c5530;
            border-radius: 6px;
            overflow: hidden;
            flex-wrap: wrap;
        }
        .toggle-btn {
            background: white;
            color: #2c5530;
            border: none;
            border-right: 1px solid #2c5530;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.1s;
        }
        .toggle-btn:last-child { border-right: none; }
        .toggle-btn:hover { background: #f0f8f0; }
        .toggle-btn.active {
            background: #2c5530;
            color: white;
            font-weight: 600;
        }
        .toolbar-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 4px;
            border-top: 1px solid #eee;
            margin-top: 4px;
        }
        .btn-charger {
            background: #2c5530;
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-charger:hover { background: #1f3a22; }
        .btn-imprimer {
            background: white;
            color: #2c5530;
            border: 1px solid #2c5530;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-imprimer:hover { background: #f0f8f0; }
        .feuille-prod {
            background: white;
            border: 0.5px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            font-size: 13px;
            color: #222;
            margin-bottom: 18px;
        }
        .feuille-entete {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #2c5530;
            padding-bottom: 8px;
            margin-bottom: 14px;
        }
        .feuille-titre { font-size: 18px; font-weight: 600; color: #2c5530; }
        .feuille-soustitre { font-size: 12px; color: #666; }
        .feuille-total { text-align: right; }
        .feuille-total-nombre {
            font-size: 28px;
            font-weight: 700;
            color: #2c5530;
            line-height: 1;
        }
        .feuille-total-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .feuille-filtres-actifs {
            margin-bottom: 10px;
            padding: 6px 10px;
            background: #fffaf0;
            border-left: 3px solid #b35900;
            font-size: 12px;
            color: #6b3500;
        }
        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        @media (max-width: 700px) {
            .grid-2cols { grid-template-columns: 1fr; }
        }
        .section-titre {
            font-size: 11px;
            font-weight: 700;
            color: #666;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .feuille-prod table {
            width: 100%;
            border-collapse: collapse;
        }
        .feuille-prod table td {
            padding: 3px 0;
        }
        .table-bloc-titre {
            padding: 6px 0 2px !important;
            font-weight: 600;
            border-bottom: 1px solid #ddd;
        }
        .table-bloc-titre-rouge {
            padding: 8px 0 2px !important;
            font-weight: 600;
            color: #c0392b;
            border-bottom: 1px solid #f0c0c0;
        }
        .table-bloc-titre-domicile {
            padding: 8px 0 2px !important;
            font-weight: 600;
            color: #1976d2;
            border-bottom: 1px solid #c0d8f0;
        }
        .table-bloc-titre-appart {
            padding: 8px 0 2px !important;
            font-weight: 600;
            color: #1976d2;
            border-bottom: 1px solid #c0d8f0;
        }
        .nombre-cellule {
            text-align: right;
            font-weight: 600;
        }
        .nombre-cellule-rouge {
            text-align: right;
            font-weight: 600;
            color: #c0392b;
        }
        .nombre-cellule-domicile {
            text-align: right;
            font-weight: 700;
            color: #1976d2;
        }
        .nombre-cellule-appart {
            text-align: right;
            font-weight: 700;
            color: #1976d2;
        }
        .bloc-info {
            margin-top: 10px;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 4px;
        }
        .bloc-info-titre {
            font-weight: 700;
            margin-bottom: 3px;
        }
        .bloc-info-orange {
            background: #fff3e0;
            border-left: 3px solid #b35900;
        }
        .bloc-info-orange .bloc-info-titre { color: #b35900; }
        .bloc-info-violet {
            background: #f3edff;
            border-left: 3px solid #5b3fa6;
        }
        .bloc-info-violet .bloc-info-titre { color: #5b3fa6; }
        .bloc-info-vide {
            color: #888;
            font-style: italic;
            font-size: 11px;
        }
        .liste-b-table thead tr {
            border-bottom: 1px solid #2c5530;
        }
        .liste-b-table th {
            text-align: left;
            padding: 4px 0;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555;
        }
        .liste-b-table .col-qte {
            font-weight: 700;
            color: #2c5530;
            width: 40px;
            padding-right: 8px;
            white-space: nowrap;
        }
        .liste-b-table tfoot tr {
            border-top: 1px solid #2c5530;
        }
        .liste-b-table tfoot td {
            padding: 6px 0 0;
            font-weight: 600;
        }
        .feuille-vide {
            padding: 30px;
            text-align: center;
            color: #888;
        }
        @media print {
            body { background: white !important; }
            .toolbar-prod,
            #app-header,
            #menu,
            .user-bar,
            h1, h2 {
                display: none !important;
            }
            .feuille-prod {
                border: none !important;
                padding: 0 !important;
                font-size: 11px !important;
                margin-bottom: 0 !important;
            }
            .feuille-prod + .feuille-prod {
                page-break-before: always;
            }
            .feuille-titre { font-size: 16px !important; }
            .grid-2cols { gap: 14px !important; }
            @page {
                size: A4 portrait;
                margin: 12mm;
            }
        }
    </style>
</head>
<body>
    <div id="app-header"></div>
    <h1>🍽️ Restauration Les Bouleaux</h1>
    <div id="menu"></div>

    <h2>📋 Production J-1 — Feuille de production cuisine</h2>

    <div class="toolbar-prod">
        <div class="toolbar-ligne">
            <span class="toolbar-label">📅 Date :</span>
            <div class="date-nav">
                <button class="btn-chevron" onclick="decalerJour(-1)" title="Jour précédent">‹</button>
                <input type="date" id="date-prod" onchange="genererFeuille()">
                <button class="btn-chevron" onclick="decalerJour(1)" title="Jour suivant">›</button>
                <button class="btn-demain" onclick="resetDemain()">📅 Demain</button>
            </div>

            <span class="toolbar-label" style="margin-left:12px;">🍴 Repas :</span>
            <div class="toggle-group" id="toggle-repas">
                <button class="toggle-btn" data-value="petit_dej" onclick="setToggleRepas(this)">🥐 P-déj</button>
                <button class="toggle-btn active" data-value="dejeuner" onclick="setToggleRepas(this)">🍽️ Déjeuner</button>
                <button class="toggle-btn" data-value="diner" onclick="setToggleRepas(this)">🌙 Dîner</button>
            </div>
        </div>

        <div class="toolbar-ligne">
            <span class="toolbar-label">🏘️ Unité :</span>
            <div class="toggle-group" id="toggle-unite">
                <button class="toggle-btn active" data-value="toutes" onclick="setToggle('unite', this)">🏘️ Toutes</button>
                <button class="toggle-btn" data-value="bouleaux" onclick="setToggle('unite', this)">🏠 Bouleaux</button>
                <button class="toggle-btn" data-value="passerelle" onclick="setToggle('unite', this)">🌉 Passerelle</button>
                <button class="toggle-btn" data-value="aucune" onclick="setToggle('unite', this)">⛔ Aucune</button>
            </div>
        </div>

        <div class="toolbar-ligne">
            <span class="toolbar-label">🍴 Clients :</span>
            <div class="toggle-group" id="toggle-client">
                <button class="toggle-btn active" data-value="tous" onclick="setToggle('client', this)">🍴 Tous</button>
                <button class="toggle-btn" data-value="aucun" onclick="setToggle('client', this)">⛔ Aucun</button>
            </div>
        </div>

        <div class="toolbar-ligne">
            <span class="toolbar-label">🏨 Appartement :</span>
            <div class="toggle-group" id="toggle-appart">
                <button class="toggle-btn active" data-value="tous" onclick="setToggle('appart', this)">🏨 Tous</button>
                <button class="toggle-btn" data-value="aucun" onclick="setToggle('appart', this)">⛔ Aucun</button>
            </div>
        </div>

        <div class="toolbar-actions">
            <button class="btn-charger" onclick="genererFeuille()">🔄 Charger</button>
            <button class="btn-imprimer" onclick="window.print()">🖨️ Imprimer</button>
        </div>
    </div>

    <div id="contenu">
        <p class="info-msg">Choisissez une date et un repas, puis cliquez "Charger".</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared.js"></script>
    <script>
        let tousLesClients = [];
        let toutesLesCategories = [];

        // Repas à domicile : jours de la semaine
        const JOURS_DOMICILE = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];

        // Définition des composants pour les repas à domicile
        const COMPOSANTS_DOMICILE = [
            { code: 'potage',       libelle: 'Potages',         emoji: '🥣', champ: 'prend_potage' },
            { code: 'salade',       libelle: 'Salades',         emoji: '🥗', champ: 'prend_salade' },
            { code: 'sauce_salade', libelle: 'Sauces à salade', emoji: '🫙', champ: 'prend_sauce_salade' },
            { code: 'plat',         libelle: 'Plats principaux', emoji: '🍽️', champ: 'prend_plat' },
            { code: 'dessert',      libelle: 'Desserts',        emoji: '🍰', champ: 'prend_dessert' }
        ];

        let valRepas = ['dejeuner'];
        let valUnite = 'toutes';
        let valClient = 'tous';
        let valAppart = 'tous';

        function demainIso() {
            const d = new Date();
            d.setDate(d.getDate() + 1);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function resetDemain() {
            document.getElementById('date-prod').value = demainIso();
            genererFeuille();
        }

        function decalerJour(delta) {
            const input = document.getElementById('date-prod');
            const val = input.value || demainIso();
            const d = new Date(val + 'T00:00:00');
            d.setDate(d.getDate() + delta);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            input.value = `${yyyy}-${mm}-${dd}`;
            genererFeuille();
        }

        function setToggleRepas(btn) {
            btn.classList.toggle('active');
            const actifs = Array.from(document.querySelectorAll('#toggle-repas .toggle-btn.active'))
                .map(b => b.dataset.value);
            valRepas = actifs;
            genererFeuille();
        }

        function setToggle(groupe, btn) {
            const containerId = `toggle-${groupe}`;
            const container = document.getElementById(containerId);
            container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const valeur = btn.dataset.value;
            if (groupe === 'unite') valUnite = valeur;
            else if (groupe === 'client') valClient = valeur;
            else if (groupe === 'appart') valAppart = valeur;

            genererFeuille();
        }

        async function initFiltres() {
            tousLesClients = await chargerTousLesClients(true);
            const container = document.getElementById('toggle-client');
            const btnAucun = container.querySelector('[data-value="aucun"]');
            for (const c of tousLesClients) {
                const btn = document.createElement('button');
                btn.className = 'toggle-btn';
                btn.dataset.value = c.id;
                btn.textContent = c.nom;
                btn.onclick = function() { setToggle('client', this); };
                container.insertBefore(btn, btnAucun);
            }

            // Bouton "Domicile" parmi les clients
            const btnDomicile = document.createElement('button');
            btnDomicile.className = 'toggle-btn';
            btnDomicile.dataset.value = 'domicile';
            btnDomicile.textContent = '🏠 Domicile';
            btnDomicile.onclick = function() { setToggle('client', this); };
            container.insertBefore(btnDomicile, btnAucun);
        }

        async function chargerDonneesProd(date) {
            const { data: residents, error: errR } = await supaClient
                .from(TABLE_RESIDENTS)
                .select('*')
                .eq('actif', true);
            if (errR) throw errR;

            const { data: presences, error: errP } = await supaClient
                .from(TABLE_PRESENCES)
                .select('*')
                .eq('date', date);
            if (errP) throw errP;

            const absences = await chargerAbsencesPourDate(date);

            const { data: commandes, error: errC } = await supaClient
                .from(TABLE_COMMANDES_EJC)
                .select('*')
                .eq('date', date);
            if (errC) throw errC;

            const { data: annulations, error: errA } = await supaClient
                .from(TABLE_ANNULATIONS_EJC)
                .select('*')
                .eq('date', date);
            if (errA) throw errA;

            toutesLesCategories = await chargerCategoriesEjc(true);

            // Personnes à domicile actives + exceptions du jour
            const { data: personnesDomicile, error: errPD } = await supaClient
                .from('personnes_domicile')
                .select('*')
                .eq('actif', true);
            if (errPD) throw errPD;

            const { data: exceptionsDomicile, error: errED } = await supaClient
                .from('livraisons_exceptions')
                .select('*')
                .eq('date_repas', date);
            if (errED) throw errED;

            // ===== APPARTEMENT : séjours en cours qui couvrent la date =====
            const { data: sejours, error: errS } = await supaClient
                .from('sejours_appartement')
                .select('*, personne:personnes_appartement(*)')
                .eq('statut', 'en_cours')
                .lte('date_arrivee', date)
                .gte('date_depart', date);
            if (errS) throw errS;

            // Présences appartement de la date (pour repérer les absents)
            let presencesAppart = [];
            if (sejours && sejours.length > 0) {
                const idsSejours = sejours.map(s => s.id);
                const { data: pa, error: errPA } = await supaClient
                    .from('presences_appartement')
                    .select('*')
                    .eq('date', date)
                    .in('sejour_id', idsSejours);
                if (errPA) throw errPA;
                presencesAppart = pa || [];
            }

            return {
                residents: residents || [],
                presences: presences || [],
                absences: absences || [],
                commandes: commandes || [],
                annulations: annulations || [],
                categories: toutesLesCategories,
                personnesDomicile: personnesDomicile || [],
                exceptionsDomicile: exceptionsDomicile || [],
                sejoursAppart: sejours || [],
                presencesAppart: presencesAppart
            };
        }

        function estPresentAuRepas(resident, repas, date, absences, mapPresences) {
            const abs = estEnAbsenceProlongee(absences, resident.id, date, repas);
            if (abs) return false;

            const key = `${resident.id}_${repas}`;
            const presence = mapPresences[key];
            if (presence && presence.present === false) return false;

            return true;
        }

        function getTextureResident(resident, repas, mapPresences) {
            const key = `${resident.id}_${repas}`;
            const p = mapPresences[key];
            if (p && p.texture) return p.texture;
            return getTextureDefautResident(resident, repas);
        }

        // ============================================================
        // APPARTEMENT : occupants présents au repas
        // ============================================================
        // Présent par défaut sauf si une présence à FALSE existe pour ce repas/jour
        function occupantsPresentsAuRepas(donnees, repas) {
            const mapPresAppart = {};
            for (const pa of donnees.presencesAppart) {
                if (pa.repas === repas) {
                    mapPresAppart[pa.sejour_id] = pa;
                }
            }

            const resultat = [];
            for (const s of donnees.sejoursAppart) {
                const pa = mapPresAppart[s.id];
                // Absent uniquement si present === false explicitement
                if (pa && pa.present === false) continue;
                if (!s.personne) continue;
                resultat.push(s.personne);
            }
            return resultat;
        }

        // ============================================================
        // REPAS À DOMICILE : quantité d'une personne pour une date
        // ============================================================
        function quantiteRythmeDomicile(personne, dateStr) {
            const [a, m, j] = dateStr.split('-').map(Number);
            const d = new Date(a, m - 1, j);
            const indexJs = d.getDay();
            const indexJour = (indexJs === 0) ? 6 : indexJs - 1;
            const nomJour = JOURS_DOMICILE[indexJour];
            return personne['qte_' + nomJour] || 0;
        }

        function domicileDuJourAvecQuantites(donnees, date) {
            const exceptionParPersonne = {};
            for (const ex of donnees.exceptionsDomicile) {
                exceptionParPersonne[ex.personne_id] = ex.quantite;
            }

            const resultat = [];
            for (const p of donnees.personnesDomicile) {
                let qte;
                if (exceptionParPersonne.hasOwnProperty(p.id)) {
                    qte = exceptionParPersonne[p.id];
                } else {
                    qte = quantiteRythmeDomicile(p, date);
                }
                if (qte > 0) {
                    resultat.push({ personne: p, quantite: qte });
                }
            }
            return resultat;
        }

        // ============================================================
        // CALCUL DES COMPOSANTS À PRODUIRE pour les repas à domicile
        // Mode auto : sans salade = pas de sauce non plus
        // ============================================================
        function calculerComposantsDomicile(domicileItems) {
            const counts = {
                potage: 0, salade: 0, sauce_salade: 0, plat: 0, dessert: 0
            };

            for (const item of (domicileItems || [])) {
                const p = item.personne;
                const q = item.quantite;
                if (p.prend_potage !== false) counts.potage += q;
                if (p.prend_plat !== false) counts.plat += q;
                if (p.prend_dessert !== false) counts.dessert += q;
                const prendSalade = (p.prend_salade !== false);
                const prendSauce  = (p.prend_sauce_salade !== false);
                if (prendSalade) counts.salade += q;
                if (prendSalade && prendSauce) counts.sauce_salade += q;
            }

            return counts;
        }

        async function genererFeuille() {
            const date = document.getElementById('date-prod').value;
            const contenu = document.getElementById('contenu');

            if (!date) {
                contenu.innerHTML = '<p class="info-msg">Sélectionne une date.</p>';
                return;
            }

            if (!valRepas.length) {
                contenu.innerHTML = '<p class="info-msg">Sélectionne au moins un repas.</p>';
                return;
            }

            const filtreUnite = valUnite;
            const filtreClient = valClient;
            const filtreAppart = valAppart;

            contenu.innerHTML = '<p class="loading">⏳ Chargement...</p>';

            let donnees;
            try {
                donnees = await chargerDonneesProd(date);
            } catch (e) {
                contenu.innerHTML = `<div class="error">Erreur : ${e.message}</div>`;
                return;
            }

            const ordreRepas = ['petit_dej', 'dejeuner', 'diner'];
            const repasAffiches = ordreRepas.filter(r => valRepas.includes(r));

            let htmlComplet = '';
            for (const repas of repasAffiches) {
                htmlComplet += construireFeuillePourRepas(repas, date, donnees, filtreUnite, filtreClient, filtreAppart);
            }

            contenu.innerHTML = htmlComplet;
        }

        function construireFeuillePourRepas(repas, date, donnees, filtreUnite, filtreClient, filtreAppart) {
            let residentsFiltres = donnees.residents;
            if (filtreUnite === 'bouleaux') {
                residentsFiltres = residentsFiltres.filter(r => r.unite === 'bouleaux');
            } else if (filtreUnite === 'passerelle') {
                residentsFiltres = residentsFiltres.filter(r => r.unite === 'passerelle');
            } else if (filtreUnite === 'aucune') {
                residentsFiltres = [];
            }

            const mapPresences = {};
            for (const p of donnees.presences) {
                if (p.repas === repas) {
                    mapPresences[`${p.resident_id}_${p.repas}`] = p;
                }
            }

            const residentsPresents = residentsFiltres.filter(r =>
                estPresentAuRepas(r, repas, date, donnees.absences, mapPresences)
            );

            let commandesFiltrees = donnees.commandes;
            if (filtreClient === 'aucun') {
                commandesFiltrees = [];
            } else if (filtreClient === 'domicile') {
                commandesFiltrees = [];
            } else if (filtreClient !== 'tous') {
                commandesFiltrees = commandesFiltrees.filter(c => c.client_id === filtreClient);
            }

            const mapAnnulations = {};
            for (const a of donnees.annulations) {
                const k = `${a.client_id}::${a.categorie_id}`;
                mapAnnulations[k] = (mapAnnulations[k] || 0) + (a.quantite || 0);
            }
            const commandesNettes = commandesFiltrees.map(c => {
                const k = `${c.client_id}::${c.categorie_id}`;
                const qte = (c.quantite || 0) - (mapAnnulations[k] || 0);
                return { ...c, quantite_nette: Math.max(0, qte) };
            }).filter(c => c.quantite_nette > 0);

            // Repas à domicile : uniquement sur le déjeuner, si filtre client OK
            let domicileItems = [];
            const domicileAutorise = (filtreClient === 'tous' || filtreClient === 'domicile');
            if (repas === 'dejeuner' && domicileAutorise) {
                domicileItems = domicileDuJourAvecQuantites(donnees, date);
            }

            // ===== Occupants appartement présents à ce repas =====
            let occupantsAppart = [];
            if (filtreAppart === 'tous') {
                occupantsAppart = occupantsPresentsAuRepas(donnees, repas);
            }

            return construireFeuille({
                date, repas,
                residentsPresents,
                mapPresences,
                commandesNettes,
                categories: donnees.categories,
                clients: tousLesClients,
                filtreUnite,
                filtreClient,
                filtreAppart,
                domicileItems,
                occupantsAppart
            });
        }

        function construireFeuille(ctx) {
            const { date, repas, residentsPresents, mapPresences, commandesNettes,
                    categories, clients, filtreUnite, filtreClient, filtreAppart,
                    domicileItems, occupantsAppart } = ctx;

            const nbResidents = residentsPresents.length;
            const nbClients = commandesNettes.reduce((s, c) => s + c.quantite_nette, 0);
            const nbDomicile = (domicileItems || []).reduce((s, item) => s + item.quantite, 0);
            const nbAppart = (occupantsAppart || []).length;
            const totalRepas = nbResidents + nbClients + nbDomicile + nbAppart;

            if (totalRepas === 0) {
                return `<div class="feuille-prod">
                    <div class="feuille-entete">
                        <div>
                            <div class="feuille-titre">Production cuisine</div>
                            <div class="feuille-soustitre">${dateFr(date)} · ${libelleRepas(repas)}</div>
                        </div>
                        <div class="feuille-total">
                            <div class="feuille-total-nombre">0</div>
                            <div class="feuille-total-label">repas total</div>
                        </div>
                    </div>
                    <div class="feuille-vide">Aucun repas à produire pour ce repas/cette date avec les filtres actuels.</div>
                </div>`;
            }

            const textureCounts = {};
            for (const r of residentsPresents) {
                const t = getTextureResident(r, repas, mapPresences);
                textureCounts[t] = (textureCounts[t] || 0) + 1;
            }

            const clientCatCounts = {};
            for (const c of commandesNettes) {
                const k = `${c.client_id}::${c.categorie_id}`;
                clientCatCounts[k] = (clientCatCounts[k] || 0) + c.quantite_nette;
            }

            // Composants à produire pour les repas à domicile
            const composantsDomicile = calculerComposantsDomicile(domicileItems);

            // ===== Allergènes : on cumule résidents + clients externes + appartement =====
            const allergeneCounts = {};
            for (const r of residentsPresents) {
                for (const a of (r.allergenes || [])) {
                    allergeneCounts[a] = (allergeneCounts[a] || 0) + 1;
                }
            }
            for (const c of commandesNettes) {
                const cat = categories.find(x => x.id === c.categorie_id);
                if (cat && cat.allergenes) {
                    for (const a of cat.allergenes) {
                        allergeneCounts[a] = (allergeneCounts[a] || 0) + c.quantite_nette;
                    }
                }
            }
            for (const o of (occupantsAppart || [])) {
                for (const a of (o.allergenes || [])) {
                    allergeneCounts[a] = (allergeneCounts[a] || 0) + 1;
                }
            }

            // ===== Autres allergies (texte libre) : résidents + appartement =====
            const autresAllergies = [];
            for (const r of residentsPresents) {
                if ((r.allergies || '').trim()) {
                    autresAllergies.push({ nom: `${r.prenom} ${r.nom}`, valeur: r.allergies.trim() });
                }
            }
            for (const o of (occupantsAppart || [])) {
                if ((o.allergies || '').trim()) {
                    autresAllergies.push({ nom: `${o.prenom} ${o.nom} (appart.)`, valeur: o.allergies.trim() });
                }
            }

            // ===== Non-goûts : résidents (aversions) + appartement (non_gouts) =====
            const nonGouts = [];
            for (const r of residentsPresents) {
                if ((r.aversions || '').trim()) {
                    nonGouts.push({ nom: `${r.prenom} ${r.nom}`, valeur: r.aversions.trim() });
                }
            }
            for (const o of (occupantsAppart || [])) {
                if ((o.non_gouts || '').trim()) {
                    nonGouts.push({ nom: `${o.prenom} ${o.nom} (appart.)`, valeur: o.non_gouts.trim() });
                }
            }

            const portions = {};

            for (const r of residentsPresents) {
                const texture = getTextureResident(r, repas, mapPresences);
                const allergenes = [...(r.allergenes || [])].sort();
                const autresAllergie = (r.allergies || '').trim();
                const intolerance = (r.intolerances || '').trim();

                const estStandard = texture === 'normale'
                    && allergenes.length === 0
                    && !autresAllergie
                    && !intolerance;

                let libelle;
                if (estStandard) {
                    libelle = 'Normale standard';
                } else {
                    const parts = [nomTextureSansEmoji(texture)];
                    if (allergenes.length) {
                        parts.push('sans ' + allergenes.map(a => libelleAllergeneCourt(a)).join(' + '));
                    }
                    if (autresAllergie) {
                        parts.push(`(autre allergie : ${autresAllergie})`);
                    }
                    if (intolerance) {
                        parts.push(`(intolérance : ${intolerance})`);
                    }
                    libelle = parts.join(' ');
                }

                const cle = `R::${texture}::${allergenes.join(',')}::${autresAllergie}::${intolerance}`;
                if (!portions[cle]) portions[cle] = { qte: 0, libelle };
                portions[cle].qte += 1;
            }

            for (const c of commandesNettes) {
                const cat = categories.find(x => x.id === c.categorie_id);
                const client = clients.find(x => x.id === c.client_id);
                const nomCat = cat ? cat.nom : `Catégorie #${c.categorie_id}`;
                const nomClient = client ? client.nom : `Client inconnu`;
                const allergenes = [...((cat && cat.allergenes) || [])].sort();

                let libelle = `${nomClient} — ${nomCat}`;
                if (allergenes.length) {
                    libelle += ' sans ' + allergenes.map(a => libelleAllergeneCourt(a)).join(' + ');
                }

                const cle = `C::${c.client_id}::${c.categorie_id}`;
                if (!portions[cle]) portions[cle] = { qte: 0, libelle };
                portions[cle].qte += c.quantite_nette;
            }

            // ===== Détail des portions DOMICILE : regroupé par profil de composants =====
            const domicileProfils = {};
            for (const item of (domicileItems || [])) {
                const p = item.personne;
                const profilKey = [
                    p.prend_potage !== false ? '1' : '0',
                    p.prend_salade !== false ? '1' : '0',
                    p.prend_sauce_salade !== false ? '1' : '0',
                    p.prend_plat !== false ? '1' : '0',
                    p.prend_dessert !== false ? '1' : '0'
                ].join('');

                if (!domicileProfils[profilKey]) {
                    domicileProfils[profilKey] = { qte: 0, profil: p };
                }
                domicileProfils[profilKey].qte += item.quantite;
            }

            for (const key in domicileProfils) {
                const d = domicileProfils[key];
                const libelle = construireLibelleProfilDomicile(d.profil);
                const cle = `D::${key}`;
                portions[cle] = { qte: d.qte, libelle: 'Domicile — ' + libelle };
            }

            // ===== Détail des portions APPARTEMENT : regroupé par allergènes =====
            // (texture toujours normale, pas de régime, donc seuls les allergènes différencient)
            for (const o of (occupantsAppart || [])) {
                const allergenes = [...(o.allergenes || [])].sort();
                const autresAllergie = (o.allergies || '').trim();

                let libelle = 'Appartement — normale standard';
                const parts = [];
                if (allergenes.length) {
                    parts.push('sans ' + allergenes.map(a => libelleAllergeneCourt(a)).join(' + '));
                }
                if (autresAllergie) {
                    parts.push(`(autre allergie : ${autresAllergie})`);
                }
                if (parts.length) {
                    libelle = 'Appartement — normale ' + parts.join(' ');
                }

                const cle = `A::${allergenes.join(',')}::${autresAllergie}`;
                if (!portions[cle]) portions[cle] = { qte: 0, libelle };
                portions[cle].qte += 1;
            }

            const portionsArr = Object.values(portions).sort((a, b) => b.qte - a.qte);
            const totalRecettes = portionsArr.length;

            const filtresActifs = construireBandeauFiltres(filtreUnite, filtreClient, filtreAppart, clients);

            return `
                <div class="feuille-prod">
                    <div class="feuille-entete">
                        <div>
                            <div class="feuille-titre">Production cuisine</div>
                            <div class="feuille-soustitre">${dateFr(date)} · ${libelleRepas(repas)}</div>
                        </div>
                        <div class="feuille-total">
                            <div class="feuille-total-nombre">${totalRepas}</div>
                            <div class="feuille-total-label">repas total</div>
                        </div>
                    </div>

                    ${filtresActifs}

                    <div class="grid-2cols">
                        <div>
                            <div class="section-titre">Vue d'ensemble</div>
                            ${construireTableEnsemble(textureCounts, clientCatCounts, allergeneCounts, commandesNettes, categories, clients, nbResidents, nbClients, composantsDomicile, nbDomicile, nbAppart)}
                            ${construireBlocAutresAllergies(autresAllergies)}
                            ${construireBlocNonGouts(nonGouts)}
                        </div>

                        <div>
                            <div class="section-titre">Détail des portions</div>
                            ${construireTablePortions(portionsArr, totalRepas, totalRecettes)}
                        </div>
                    </div>
                </div>
            `;
        }

        // Construit un libellé compact selon les composants pris
        function construireLibelleProfilDomicile(p) {
            const prendPotage = p.prend_potage !== false;
            const prendSalade = p.prend_salade !== false;
            const prendSauce  = p.prend_sauce_salade !== false;
            const prendPlat   = p.prend_plat !== false;
            const prendDessert = p.prend_dessert !== false;

            if (prendPotage && prendSalade && prendSauce && prendPlat && prendDessert) {
                return 'menu complet';
            }

            const sans = [];
            if (!prendPotage) sans.push('potage');
            if (!prendSalade) {
                sans.push('salade');
            } else if (!prendSauce) {
                sans.push('sauce salade');
            }
            if (!prendPlat) sans.push('plat');
            if (!prendDessert) sans.push('dessert');

            if (sans.length === 0) return 'menu complet';
            return 'sans ' + sans.join(' + ');
        }

        function libelleAllergeneCourt(code) {
            const a = ALLERGENES_LISTE.find(x => x.code === code);
            return a ? a.nom.toLowerCase() : code;
        }

        function construireBandeauFiltres(filtreUnite, filtreClient, filtreAppart, clients) {
            const parts = [];
            if (filtreUnite === 'bouleaux') parts.push('🏠 Bouleaux uniquement');
            else if (filtreUnite === 'passerelle') parts.push('🌉 Passerelle uniquement');
            else if (filtreUnite === 'aucune') parts.push('Aucune unité');

            if (filtreClient === 'aucun') parts.push('Aucun client externe');
            else if (filtreClient === 'domicile') parts.push('🏠 Repas à domicile uniquement');
            else if (filtreClient !== 'tous') {
                const c = clients.find(x => x.id === filtreClient);
                if (c) parts.push(`Client : ${c.nom}`);
            }

            if (filtreAppart === 'aucun') parts.push('🏨 Sans appartement');

            if (!parts.length) return '';
            return `<div class="feuille-filtres-actifs">🔍 Filtres actifs : ${parts.join(' · ')}</div>`;
        }

        function construireTableEnsemble(textureCounts, clientCatCounts, allergeneCounts, commandesNettes, categories, clients, nbResidents, nbClients, composantsDomicile, nbDomicile, nbAppart) {
            let html = '<table>';

            if (nbResidents > 0) {
                html += `<tr><td colspan="2" class="table-bloc-titre">Textures résidents (${nbResidents})</td></tr>`;
                for (const t of TEXTURES_LISTE) {
                    const n = textureCounts[t.code] || 0;
                    if (n > 0) {
                        html += `<tr><td>${t.nom}</td><td class="nombre-cellule">${n}</td></tr>`;
                    }
                }
            }

            if (nbClients > 0) {
                html += `<tr><td colspan="2" class="table-bloc-titre">Clients externes (${nbClients})</td></tr>`;
                const lignes = [];
                for (const cle in clientCatCounts) {
                    const parts = cle.split('::');
                    const clientId = parts[0];
                    const catId = parseInt(parts[1]);
                    const client = clients.find(x => x.id === clientId);
                    const cat = categories.find(x => x.id === catId);
                    lignes.push({
                        libelle: `${client ? client.nom : 'Client'} — ${cat ? cat.nom : 'Catégorie'}`,
                        qte: clientCatCounts[cle]
                    });
                }
                lignes.sort((a, b) => b.qte - a.qte);
                for (const l of lignes) {
                    html += `<tr><td>${l.libelle}</td><td class="nombre-cellule">${l.qte}</td></tr>`;
                }
            }

            // ===== Bloc Appartement Corgémont =====
            if (nbAppart > 0) {
                html += `<tr><td colspan="2" class="table-bloc-titre-appart">🏨 Appartement Corgémont (${nbAppart})</td></tr>`;
                html += `<tr><td>Occupants présents</td><td class="nombre-cellule-appart">${nbAppart}</td></tr>`;
            }

            // ===== Bloc Composants à produire (repas à domicile) =====
            if (nbDomicile > 0) {
                html += `<tr><td colspan="2" class="table-bloc-titre-domicile">🏠 Repas à domicile — Composants à produire (${nbDomicile} repas)</td></tr>`;
                for (const c of COMPOSANTS_DOMICILE) {
                    const n = composantsDomicile[c.code] || 0;
                    html += `<tr><td>${c.emoji} ${c.libelle}</td><td class="nombre-cellule-domicile">${n}</td></tr>`;
                }
            }

            const allergenesPresents = Object.entries(allergeneCounts).filter(([_, n]) => n > 0);
            if (allergenesPresents.length > 0) {
                html += `<tr><td colspan="2" class="table-bloc-titre-rouge">Régimes spéciaux UE</td></tr>`;
                for (const a of ALLERGENES_LISTE) {
                    const n = allergeneCounts[a.code] || 0;
                    if (n > 0) {
                        html += `<tr><td>Sans ${a.nom.toLowerCase()}</td><td class="nombre-cellule-rouge">${n}</td></tr>`;
                    }
                }
            }

            html += '</table>';
            return html;
        }

        function construireBlocAutresAllergies(autres) {
            let html = `<div class="bloc-info bloc-info-orange">
                <div class="bloc-info-titre">⚠ Autres allergies à vérifier</div>`;
            if (autres.length === 0) {
                html += `<div class="bloc-info-vide">Aucune pour ce repas</div>`;
            } else {
                for (const a of autres) {
                    html += `<div>${a.nom} — ${a.valeur}</div>`;
                }
            }
            html += '</div>';
            return html;
        }

        function construireBlocNonGouts(nonGouts) {
            let html = `<div class="bloc-info bloc-info-violet">
                <div class="bloc-info-titre">📝 Non-goûts à vérifier (selon menu)</div>`;
            if (nonGouts.length === 0) {
                html += `<div class="bloc-info-vide">Aucun pour ce repas</div>`;
            } else {
                for (const n of nonGouts) {
                    html += `<div>${n.nom} — ${n.valeur}</div>`;
                }
            }
            html += '</div>';
            return html;
        }

        function construireTablePortions(portions, totalRepas, totalRecettes) {
            let html = `<table class="liste-b-table">
                <thead>
                    <tr>
                        <th>Qté</th>
                        <th>Recette</th>
                    </tr>
                </thead>
                <tbody>`;
            for (const p of portions) {
                html += `<tr><td class="col-qte">${p.qte}×</td><td>${p.libelle}</td></tr>`;
            }
            html += `</tbody>
                <tfoot>
                    <tr><td colspan="2">${totalRepas} portions · ${totalRecettes} recette(s) distincte(s)</td></tr>
                </tfoot>
            </table>`;
            return html;
        }

        (async () => {
            const auth = await verifierAuthEtRole(['admin']);
            if (!auth) return;
            afficherMenuComplet('production', auth.user.email, auth.profil.role, auth.profil.nom_affiche);
            document.getElementById('date-prod').value = demainIso();
            await initFiltres();
            genererFeuille();
        })();
    </script>
</body>
</html>
