 <!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Présences repas à domicile — Les Bouleaux</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>

  <div id="app-header"></div>
  <div id="menu"></div>

  <h1>🗓️ Présences repas à domicile</h1>
  <p>Pointage mensuel des repas livrés à domicile</p>

  <div class="toolbar" style="align-items:center; gap:8px;">
    <button type="button" class="btn btn-secondary" id="btn-jour-precedent">‹</button>
    <button type="button" class="btn btn-print" id="btn-imprimer-livraison">
      🚚 Imprimer feuille de livraison
    </button>
    <button type="button" class="btn btn-secondary" id="btn-jour-suivant">›</button>
    <input type="date" id="date-livraison" style="padding:10px; border:1px solid #ccc; border-radius:6px; font-size:15px; font-family:inherit;">
  </div>

  <div id="zone-livraison"></div>

  <div id="liste-personnes">
    <div class="loading">Chargement…</div>
  </div>

  <div id="modal-pointage" class="modal-overlay">
    <div class="modal">
      <h2 id="pointage-titre">Présences</h2>
      <p id="pointage-rythme" style="color:#888; margin-top:-8px;"></p>

      <div class="toolbar" style="justify-content:space-between; align-items:center;">
        <button type="button" class="btn btn-secondary" id="btn-mois-precedent">‹</button>
        <strong id="pointage-mois" style="font-size:16px;"></strong>
        <button type="button" class="btn btn-secondary" id="btn-mois-suivant">›</button>
      </div>

      <div id="pointage-calendrier" style="margin-top:10px;"></div>

      <div id="pointage-signataires" style="margin-top:10px; font-size:13px; color:#666; font-style:italic;"></div>

      <div style="margin-top:14px; padding-top:12px; border-top:1px solid #eee; font-size:13px; color:#666; line-height:1.9;">
        <div><span style="display:inline-block; width:16px; height:16px; background:#eef3ee; border:1px solid #cdddcd; border-radius:3px; vertical-align:middle;"></span> Conforme au rythme habituel</div>
        <div><span style="display:inline-block; width:16px; height:16px; background:#fff3cd; border:2px solid #f0ad4e; border-radius:3px; vertical-align:middle;"></span> Quantité augmentée (invité, etc.)</div>
        <div><span style="display:inline-block; width:16px; height:16px; background:#fdecea; border:2px solid #c0392b; border-radius:3px; vertical-align:middle;"></span> Quantité réduite ou absence</div>
      </div>

      <div class="form-group" style="margin-top:16px;">
        <label for="pointage-signature">Pointage effectué par *</label>
        <input type="text" id="pointage-signature" placeholder="Votre prénom — obligatoire pour enregistrer">
      </div>

      <div id="pointage-message"></div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="btn-fermer-pointage">Fermer</button>
        <button type="button" class="btn btn-primary" id="btn-enregistrer-pointage">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <script>
  // ================================================
  // PAGE PRÉSENCES REPAS À DOMICILE
  // Liste des personnes + pop-up de pointage mensuel EN QUANTITÉS
  // + feuille de livraison imprimable
  // ================================================

  const JOURS = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
  const NOMS_MOIS = ['janvier','février','mars','avril','mai','juin',
                     'juillet','août','septembre','octobre','novembre','décembre'];

  // Référentiels
  let formulesParCode = {};
  let villagesParCode = {};
  let villagesOrdre = {};

  // Personne en cours de pointage
  let personneCourante = null;
  let anneeAffichee = null;
  let moisAffiche = null;
  // Exceptions de la personne courante, par date "AAAA-MM-JJ"
  // valeur = { quantite: N, signe_par: '...' }
  let exceptionsCourantes = {};
  // Quantité saisie pour chaque jour affiché, par date "AAAA-MM-JJ"
  // C'est ce que l'utilisateur modifie dans les champs
  let quantitesJours = {};

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = await verifierAuthEtRole(['admin']);
    if (!auth) return;

    afficherMenuComplet(
      'presences-domicile',
      auth.user.email,
      auth.profil.role,
      auth.profil.nom_affiche
    );

    await chargerReferentiels();
    await chargerListePersonnes();

    const demain = new Date();
    demain.setDate(demain.getDate() + 1);
    document.getElementById('date-livraison').value = formatDateObjet(demain);

    document.getElementById('btn-fermer-pointage')
      .addEventListener('click', fermerPointage);
    document.getElementById('btn-enregistrer-pointage')
      .addEventListener('click', enregistrerPointage);
    document.getElementById('btn-mois-precedent')
      .addEventListener('click', () => changerMois(-1));
    document.getElementById('btn-mois-suivant')
      .addEventListener('click', () => changerMois(1));

    document.getElementById('btn-imprimer-livraison')
      .addEventListener('click', genererFeuilleLivraison);
    document.getElementById('btn-jour-precedent')
      .addEventListener('click', () => decalerJourLivraison(-1));
    document.getElementById('btn-jour-suivant')
      .addEventListener('click', () => decalerJourLivraison(1));
  });

  // ----- Charger les référentiels (formules + villages) -----
  async function chargerReferentiels() {
    const { data: formules } = await supaClient
      .from('formules_repas')
      .select('code, libelle');
    (formules || []).forEach(f => { formulesParCode[f.code] = f.libelle; });

    const { data: villages } = await supaClient
      .from('villages')
      .select('code, libelle, ordre_affichage');
    (villages || []).forEach(v => {
      villagesParCode[v.code] = v.libelle;
      villagesOrdre[v.code] = v.ordre_affichage;
    });
  }

  // ----- Charger la liste des personnes actives -----
  async function chargerListePersonnes() {
    const conteneur = document.getElementById('liste-personnes');

    const { data, error } = await supaClient
      .from('personnes_domicile')
      .select('*')
      .eq('actif', true)
      .order('nom', { ascending: true })
      .order('prenom', { ascending: true });

    if (error) {
      console.error('Erreur chargement personnes :', error);
      conteneur.innerHTML =
        '<div class="erreur-msg">Erreur : impossible de charger les personnes.</div>';
      return;
    }

    if (!data || data.length === 0) {
      conteneur.innerHTML =
        '<div class="info-msg">Aucune personne active. Créez des fiches dans l\'onglet Repas à domicile.</div>';
      return;
    }

    let html = '<table class="presences"><thead><tr>'
             + '<th>Nom</th><th>Prénom</th><th>Rythme</th><th></th>'
             + '</tr></thead><tbody>';

    data.forEach(p => {
      html += '<tr>'
            + '<td>' + echapper(p.nom) + '</td>'
            + '<td>' + echapper(p.prenom) + '</td>'
            + '<td>' + echapper(resumeRythme(p)) + '</td>'
            + '<td><button type="button" class="btn-primary btn-small" '
            + 'onclick="ouvrirPointage(' + p.id + ')">Pointer le mois</button></td>'
            + '</tr>';
    });

    html += '</tbody></table>';
    conteneur.innerHTML = html;
  }

  // ----- Résumé court du rythme en quantités (ex : "Lu 1 · Je 2") -----
  function resumeRythme(p) {
    const abrev = {
      lundi:'Lu', mardi:'Ma', mercredi:'Me', jeudi:'Je',
      vendredi:'Ve', samedi:'Sa', dimanche:'Di'
    };
    const morceaux = JOURS
      .filter(jour => (p['qte_' + jour] || 0) > 0)
      .map(jour => abrev[jour] + ' ' + p['qte_' + jour]);

    if (morceaux.length === 0) return '—';
    return morceaux.join(' · ');
  }

  // ----- Rythme complet en toutes lettres (sous-titre du pop-up) -----
  function rythmeEnToutesLettres(p) {
    const morceaux = JOURS
      .filter(jour => (p['qte_' + jour] || 0) > 0)
      .map(jour => jour + ' ' + p['qte_' + jour]);
    if (morceaux.length === 0) return 'aucun rythme par défaut (uniquement ponctuel)';
    return morceaux.join(', ');
  }

  // ================================================
  // POP-UP DE POINTAGE
  // ================================================

  async function ouvrirPointage(id) {
    const { data, error } = await supaClient
      .from('personnes_domicile')
      .select('*')
      .eq('id', id)
      .maybeSingle();

    if (error || !data) {
      console.error('Erreur chargement de la fiche :', error);
      alert('Impossible de charger cette fiche.');
      return;
    }

    personneCourante = data;

    const maintenant = new Date();
    anneeAffichee = maintenant.getFullYear();
    moisAffiche = maintenant.getMonth();

    document.getElementById('pointage-titre').textContent =
      'Présences — ' + (data.prenom || '') + ' ' + (data.nom || '');
    document.getElementById('pointage-rythme').textContent =
      'Quantité par défaut : ' + rythmeEnToutesLettres(data);

    document.getElementById('pointage-signature').value = '';
    document.getElementById('pointage-message').innerHTML = '';

    await chargerExceptionsEtAfficher();

    document.getElementById('modal-pointage').classList.add('active');
  }

  async function changerMois(sens) {
    moisAffiche += sens;
    if (moisAffiche < 0) { moisAffiche = 11; anneeAffichee--; }
    if (moisAffiche > 11) { moisAffiche = 0; anneeAffichee++; }
    await chargerExceptionsEtAfficher();
  }

  async function chargerExceptionsEtAfficher() {
    const premierJour = formatDate(anneeAffichee, moisAffiche, 1);
    const nbJours = new Date(anneeAffichee, moisAffiche + 1, 0).getDate();
    const dernierJour = formatDate(anneeAffichee, moisAffiche, nbJours);

    const { data, error } = await supaClient
      .from('livraisons_exceptions')
      .select('*')
      .eq('personne_id', personneCourante.id)
      .gte('date_repas', premierJour)
      .lte('date_repas', dernierJour);

    if (error) {
      console.error('Erreur chargement exceptions :', error);
      document.getElementById('pointage-calendrier').innerHTML =
        '<div class="erreur-msg">Erreur : impossible de charger les présences du mois.</div>';
      return;
    }

    // Range les exceptions par date
    exceptionsCourantes = {};
    (data || []).forEach(ex => {
      exceptionsCourantes[ex.date_repas] = {
        quantite: ex.quantite,
        signe_par: ex.signe_par
      };
    });

    // Construit la quantité de chaque jour du mois :
    // - si exception => sa quantité
    // - sinon => la quantité du rythme pour ce jour de la semaine
    quantitesJours = {};
    for (let jour = 1; jour <= nbJours; jour++) {
      const dateStr = formatDate(anneeAffichee, moisAffiche, jour);
      const exception = exceptionsCourantes[dateStr];
      if (exception) {
        quantitesJours[dateStr] = exception.quantite;
      } else {
        quantitesJours[dateStr] = quantiteRythme(personneCourante, dateStr);
      }
    }

    dessinerCalendrier();
    afficherSignataires();
  }

  // ----- Quantité prévue par le rythme pour une date donnée -----
  function quantiteRythme(personne, dateStr) {
    const [a, m, j] = dateStr.split('-').map(Number);
    const d = new Date(a, m - 1, j);
    const indexJs = d.getDay();                       // 0=dimanche..6=samedi
    const indexJour = (indexJs === 0) ? 6 : indexJs - 1; // 0=lundi..6=dimanche
    const nomJour = JOURS[indexJour];
    return personne['qte_' + nomJour] || 0;
  }

  function dessinerCalendrier() {
    document.getElementById('pointage-mois').textContent =
      NOMS_MOIS[moisAffiche] + ' ' + anneeAffichee;

    const nbJours = new Date(anneeAffichee, moisAffiche + 1, 0).getDate();

    const premier = new Date(anneeAffichee, moisAffiche, 1);
    const indexJsPremier = premier.getDay();
    const decalage = (indexJsPremier === 0) ? 6 : indexJsPremier - 1;

    let html = '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px;">';
    ['Lu','Ma','Me','Je','Ve','Sa','Di'].forEach(j => {
      html += '<div style="text-align:center; font-size:12px; color:#888; font-weight:bold;">' + j + '</div>';
    });
    html += '</div>';

    html += '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px;">';

    for (let i = 0; i < decalage; i++) {
      html += '<div></div>';
    }

    for (let jour = 1; jour <= nbJours; jour++) {
      const dateStr = formatDate(anneeAffichee, moisAffiche, jour);
      const qteSaisie = quantitesJours[dateStr];
      const qtePrevue = quantiteRythme(personneCourante, dateStr);

      // Couleur de la case selon l'écart entre saisie et rythme
      let styleCase = 'aspect-ratio:1; border-radius:5px; padding:2px; '
                    + 'display:flex; flex-direction:column; align-items:center; '
                    + 'justify-content:center;';
      let styleChamp = 'width:30px; text-align:center; border-radius:4px; '
                     + 'font-size:13px; font-family:inherit;';
      let styleNum = 'font-size:10px;';

      if (qteSaisie > qtePrevue) {
        // Augmentation => jaune
        styleCase += 'background:#fff3cd; border:2px solid #f0ad4e;';
        styleChamp += 'border:1px solid #f0ad4e; color:#a05000;';
        styleNum += 'color:#a05000;';
      } else if (qteSaisie < qtePrevue) {
        // Réduction ou absence => rouge
        styleCase += 'background:#fdecea; border:2px solid #c0392b;';
        styleChamp += 'border:1px solid #c0392b; color:#922b21;';
        styleNum += 'color:#922b21;';
      } else {
        // Conforme au rythme => vert pâle
        styleCase += 'background:#eef3ee; border:1px solid #cdddcd;';
        styleChamp += 'border:1px solid #2c5530; color:#2c5530;';
        styleNum += 'color:#888;';
      }

      html += '<div style="' + styleCase + '">'
            + '<span style="' + styleNum + '">' + jour + '</span>'
            + '<input type="number" min="0" value="' + qteSaisie + '" '
            + 'style="' + styleChamp + '" '
            + 'onchange="changerQuantite(\'' + dateStr + '\', this.value)">'
            + '</div>';
    }

    html += '</div>';
    document.getElementById('pointage-calendrier').innerHTML = html;
  }

  // ----- L'utilisateur change la quantité d'un jour -----
  function changerQuantite(dateStr, valeur) {
    let n = parseInt(valeur, 10);
    if (isNaN(n) || n < 0) n = 0;
    quantitesJours[dateStr] = n;
    dessinerCalendrier();
  }

  function afficherSignataires() {
    const conteneur = document.getElementById('pointage-signataires');

    const prenoms = [];
    Object.values(exceptionsCourantes).forEach(ex => {
      const nom = (ex.signe_par || '').trim();
      if (nom && !prenoms.includes(nom)) {
        prenoms.push(nom);
      }
    });

    if (prenoms.length === 0) {
      conteneur.textContent = 'Aucune modification enregistrée sur ce mois.';
    } else {
      conteneur.textContent =
        'Dernières modifications effectuées par : ' + prenoms.join(', ');
    }
  }

  // ----- Enregistrer le pointage du mois -----
  async function enregistrerPointage() {
    const message = document.getElementById('pointage-message');
    message.innerHTML = '';

    const signature = document.getElementById('pointage-signature').value.trim();
    if (!signature) {
      message.innerHTML =
        '<div class="erreur-msg">Merci d\'indiquer votre prénom avant d\'enregistrer.</div>';
      return;
    }

    const nbJours = new Date(anneeAffichee, moisAffiche + 1, 0).getDate();

    const aSupprimer = []; // dates dont l'exception doit disparaître
    const aPoser = [];     // exceptions à créer/mettre à jour

    for (let jour = 1; jour <= nbJours; jour++) {
      const dateStr = formatDate(anneeAffichee, moisAffiche, jour);
      const qteSaisie = quantitesJours[dateStr];
      const qtePrevue = quantiteRythme(personneCourante, dateStr);

      if (qteSaisie === qtePrevue) {
        // Conforme au rythme : aucune exception nécessaire.
        // Si une exception existait pour ce jour, elle doit être supprimée.
        if (exceptionsCourantes[dateStr]) {
          aSupprimer.push(dateStr);
        }
      } else {
        // Écart par rapport au rythme : une exception enregistre la quantité réelle.
        aPoser.push({
          personne_id: personneCourante.id,
          date_repas: dateStr,
          quantite: qteSaisie,
          signe_par: signature
        });
      }
    }

    if (aSupprimer.length > 0) {
      const { error: errSuppr } = await supaClient
        .from('livraisons_exceptions')
        .delete()
        .eq('personne_id', personneCourante.id)
        .in('date_repas', aSupprimer);

      if (errSuppr) {
        console.error('Erreur suppression exceptions :', errSuppr);
        message.innerHTML =
          '<div class="erreur-msg">Erreur lors de l\'enregistrement (suppression).</div>';
        return;
      }
    }

    if (aPoser.length > 0) {
      const { error: errPose } = await supaClient
        .from('livraisons_exceptions')
        .upsert(aPoser, { onConflict: 'personne_id,date_repas' });

      if (errPose) {
        console.error('Erreur enregistrement exceptions :', errPose);
        message.innerHTML =
          '<div class="erreur-msg">Erreur lors de l\'enregistrement.</div>';
        return;
      }
    }

    message.innerHTML =
      '<div class="success">Pointage du mois enregistré ✔</div>';

    await chargerExceptionsEtAfficher();
  }

  function fermerPointage() {
    document.getElementById('modal-pointage').classList.remove('active');
    personneCourante = null;
  }

  // ================================================
  // FEUILLE DE LIVRAISON
  // ================================================

  function decalerJourLivraison(sens) {
    const champDate = document.getElementById('date-livraison');
    if (!champDate.value) return;
    const [a, m, j] = champDate.value.split('-').map(Number);
    const d = new Date(a, m - 1, j);
    d.setDate(d.getDate() + sens);
    champDate.value = formatDateObjet(d);
  }

  async function genererFeuilleLivraison() {
    const zone = document.getElementById('zone-livraison');
    const dateStr = document.getElementById('date-livraison').value;

    if (!dateStr) {
      zone.innerHTML = '<div class="erreur-msg">Merci de choisir une date.</div>';
      return;
    }

    zone.innerHTML = '<div class="loading">Préparation de la feuille…</div>';

    // 1) Toutes les personnes actives
    const { data: personnes, error: errP } = await supaClient
      .from('personnes_domicile')
      .select('*')
      .eq('actif', true);

    if (errP) {
      console.error('Erreur chargement personnes :', errP);
      zone.innerHTML = '<div class="erreur-msg">Erreur : impossible de préparer la feuille.</div>';
      return;
    }

    // 2) Toutes les exceptions de ce jour-là
    const { data: exceptions, error: errE } = await supaClient
      .from('livraisons_exceptions')
      .select('*')
      .eq('date_repas', dateStr);

    if (errE) {
      console.error('Erreur chargement exceptions :', errE);
      zone.innerHTML = '<div class="erreur-msg">Erreur : impossible de préparer la feuille.</div>';
      return;
    }

    // Range les exceptions du jour par personne
    const exceptionParPersonne = {};
    (exceptions || []).forEach(ex => {
      exceptionParPersonne[ex.personne_id] = ex.quantite;
    });

    // 3) Pour chaque personne, la quantité du jour :
    //    - exception => sa quantité
    //    - sinon => la quantité du rythme
    //    On ne garde que les personnes avec une quantité > 0.
    const aLivrer = [];
    (personnes || []).forEach(p => {
      let qte;
      if (exceptionParPersonne.hasOwnProperty(p.id)) {
        qte = exceptionParPersonne[p.id];
      } else {
        qte = quantiteRythme(p, dateStr);
      }
      if (qte > 0) {
        aLivrer.push({ personne: p, quantite: qte });
      }
    });

    if (aLivrer.length === 0) {
      zone.innerHTML = '<div class="print-area"><div class="info-msg">'
                     + 'Aucune livraison prévue le ' + dateEnToutesLettres(dateStr) + '.'
                     + '</div></div>';
      return;
    }

    // 4) Regrouper par village
    const parVillage = {};
    aLivrer.forEach(item => {
      const codeV = item.personne.village_code || '_sans_village';
      if (!parVillage[codeV]) parVillage[codeV] = [];
      parVillage[codeV].push(item);
    });

    const codesVillages = Object.keys(parVillage).sort((a, b) => {
      if (a === '_sans_village') return 1;
      if (b === '_sans_village') return -1;
      return (villagesOrdre[a] || 999) - (villagesOrdre[b] || 999);
    });

    // Total général de repas (somme des quantités)
    const totalRepas = aLivrer.reduce((s, item) => s + item.quantite, 0);

    // 5) Construire la feuille imprimable
    let html = '<div class="print-area">';
    html += '<h2>Feuille de livraison — ' + dateEnToutesLettres(dateStr) + '</h2>';
    html += '<p>' + totalRepas + ' repas à livrer</p>';

    codesVillages.forEach(codeV => {
      const nomVillage = (codeV === '_sans_village')
        ? 'Village non renseigné'
        : (villagesParCode[codeV] || codeV);

      // Trie les personnes du village par nom
      const items = parVillage[codeV].sort((a, b) => {
        const nomA = (a.personne.nom || '').toLowerCase();
        const nomB = (b.personne.nom || '').toLowerCase();
        if (nomA < nomB) return -1;
        if (nomA > nomB) return 1;
        return 0;
      });

      const totalVillage = items.reduce((s, item) => s + item.quantite, 0);

      html += '<div class="print-section">';
      html += '<h3>' + echapper(nomVillage) + ' — ' + totalVillage + ' repas</h3>';
      html += '<table class="presences"><thead><tr>'
            + '<th>Nb</th><th>Nom</th><th>Prénom</th><th>Adresse</th>'
            + '<th>Téléphone</th><th>Formule</th><th>Consignes</th>'
            + '</tr></thead><tbody>';

      items.forEach(item => {
        const p = item.personne;
        const libelleFormule = formulesParCode[p.formule_code] || p.formule_code || '—';
        html += '<tr>'
              + '<td><strong>' + item.quantite + '</strong></td>'
              + '<td>' + echapper(p.nom) + '</td>'
              + '<td>' + echapper(p.prenom) + '</td>'
              + '<td>' + echapper(p.adresse_livraison || '—') + '</td>'
              + '<td>' + echapper(p.telephone || '—') + '</td>'
              + '<td>' + echapper(libelleFormule) + '</td>'
              + '<td>' + echapper(p.consignes_livraison || '—') + '</td>'
              + '</tr>';
      });

      html += '</tbody></table></div>';
    });

    html += '<div class="no-print" style="margin-top:20px;">'
          + '<button type="button" class="btn btn-print" onclick="window.print()">🖨️ Imprimer</button>'
          + '</div>';
    html += '</div>';

    zone.innerHTML = html;
    zone.scrollIntoView({ behavior: 'smooth' });
  }

  // ================================================
  // OUTILS DE DATE
  // ================================================

  function formatDate(annee, mois, jour) {
    const mm = String(mois + 1).padStart(2, '0');
    const jj = String(jour).padStart(2, '0');
    return annee + '-' + mm + '-' + jj;
  }

  function formatDateObjet(d) {
    return formatDate(d.getFullYear(), d.getMonth(), d.getDate());
  }

  function dateEnToutesLettres(dateStr) {
    const [a, m, j] = dateStr.split('-').map(Number);
    const d = new Date(a, m - 1, j);
    const jours = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    return jours[d.getDay()] + ' ' + j + ' ' + NOMS_MOIS[m - 1] + ' ' + a;
  }

  function echapper(texte) {
    if (texte === null || texte === undefined) return '';
    return String(texte)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
